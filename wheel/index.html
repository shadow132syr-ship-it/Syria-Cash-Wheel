<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سوريا كاش - العجلة الاحترافية العالمية</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0d111a radial-gradient(circle at center, #1a2333 0%, #06090e 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        /* مسرح الـ 3D الحقيقي المطابق لزاوية الفيديو بالملي */
        .game-stage {
            perspective: 1200px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
        }

        .wheel-theater {
            position: relative;
            width: 88vw;
            max-width: 360px;
            height: 88vw;
            max-width: 360px;
            /* تأثير الميلان الساحر المتناسق مع الشاشة دون تمطيط */
            transform: rotateX(24deg);
            transform-style: preserve-3d;
        }

        /* 2. الإطار الخارجي الثابت الفخم جداً من الفيديو */
        .ring-frame {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('wheel_ring.png') no-repeat center center;
            background-size: contain;
            z-index: 15;
            pointer-events: none;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.7));
        }

        /* 1. قرص الجرافيك الدوار الأصلي (اللي فيه الألوان والأيقونات الحقيقية) */
        .wheel-core {
            position: absolute;
            width: 91%;
            height: 91%;
            top: 4.5%;
            left: 4.5%;
            background: url('wheel_main.png') no-repeat center center;
            background-size: contain;
            border-radius: 50%;
            z-index: 10;
            /* سلاسة حركة سينمائية فائقة النعومة */
            transition: transform 6s cubic-bezier(0.1, 0.88, 0.15, 1);
        }

        /* 3. سهم التثبيت الواقعي المهتز */
        .center-pointer {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 50px;
            background: url('pointer_top.png') no-repeat center center;
            background-size: contain;
            z-index: 30;
            transform-origin: 50% 0%;
        }

        /* حركة اهتزاز وتكتكة السهم الاحترافية عند ملامسة الفواصل */
        @keyframes pointer-tick {
            0% { transform: translateX(-50%) rotate(0deg); }
            40% { transform: translateX(-50%) rotate(-16deg); }
            100% { transform: translateX(-50%) rotate(0deg); }
        }

        .center-pointer.ticking {
            animation: pointer-tick 0.1s ease-in-out;
        }

        /* زر التدوير الفخم المطابق للبوستر */
        .spin-trigger-btn {
            background: linear-gradient(180deg, #fffde7 0%, #ffeb3b 40%, #f57f17 100%);
            color: #0c0f16;
            border: 1px solid #ffffff;
            padding: 14px 65px;
            font-size: 1.25rem;
            font-weight: 900;
            border-radius: 35px;
            cursor: pointer;
            box-shadow: 
                0 0 20px rgba(255, 235, 59, 0.4),
                0 8px 25px rgba(0,0,0,0.5);
            transition: all 0.2s ease;
            text-shadow: 0 1px 1px rgba(255,255,255,0.3);
        }

        .spin-trigger-btn:active {
            transform: scale(0.95);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .spin-trigger-btn:disabled {
            background: linear-gradient(180deg, #2d3545 0%, #1c212b 100%);
            color: #556075;
            border-color: #232936;
            box-shadow: none;
            cursor: not-allowed;
        }

        .experimental-panel {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 235, 59, 0.15);
            border-radius: 16px;
            padding: 12px 25px;
            text-align: center;
            width: 82%;
            max-width: 310px;
            margin-top: 30px;
            font-size: 0.85rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .gold-bright { color: #ffeb3b; font-weight: bold; }
    </style>
</head>
<body>

    <div class="game-stage">
        <div class="wheel-theater">
            <div class="center-pointer" id="tickerDevice"></div>
            <div class="ring-frame"></div>
            <div class="wheel-core" id="wheelDisk"></div>
        </div>
    </div>

    <button class="spin-trigger-btn" id="actionBtn" onclick="launchRoyalSpin()">ابدأ التدوير</button>

    <div class="experimental-panel">
        <span class="gold-bright">الوضع التجريبي نشط</span><br>
        اللغة التجريبية مخصصة لتجربة العجلة فقط، وليست لعباً حقيقياً.
    </div>

    <audio id="tickSnd" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav" preload="auto"></audio>
    <audio id="winSnd" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-84.wav" preload="auto"></audio>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode') || 'cash';

    const wheelDisk = document.getElementById('wheelDisk');
    const tickerDevice = document.getElementById('tickerDevice');
    const tickSnd = document.getElementById('tickSnd');
    const winSnd = document.getElementById('winSnd');

    // توزيع الجوائز المطابق لترتيب الأقسام بملفك الأصلي بالفيديو من القمة مع عقارب الساعة
    let prizes = [];
    if(mode === 'refs') {
        prizes = ["50 ليرة", "50 ليرة", "50 ليرة", "50 ليرة", "50 ليرة", "50 ليرة", "50 ليرة", "50 ليرة"];
    } else {
        prizes = ["50 ليرة", "100 ليرة", "200 ليرة", "350 ليرة", "500 ليرة", "750 ليرة", "1000 ليرة", "1500 ليرة"];
    }
    
    const segmentsCount = prizes.length;

    function launchRoyalSpin() {
        document.getElementById('actionBtn').disabled = true;

        const luckyIdx = Math.floor(Math.random() * segmentsCount);
        const wonPrize = prizes[luckyIdx];

        // 8 دورات سريعة وفائقة الانسيابية والنعومة متناسقة مع أداء الألعاب
        const baseTurns = 8 * 360;
        const targetDeg = baseTurns + (360 - (luckyIdx * (360 / segmentsCount)) - (180 / segmentsCount));

        // دوران الجرافيك الحقيقي
        wheelDisk.style.transform = `rotate(${targetDeg}deg)`;

        // محاكاة اهتزاز وتكتكة السهم الميكانيكي مع الصوت وتفاعل الـ Haptic بالتناوب
        let tickCount = 0;
        const totalTicks = 58; 
        let currentInterval = 40;

        function playTickEffect() {
            if (tickCount < totalTicks) {
                tickerDevice.classList.remove('ticking');
                void tickerDevice.offsetWidth; // ريست للأنيميشن فورا
                tickerDevice.classList.add('ticking');

                tickSnd.currentTime = 0;
                tickSnd.play().catch(()=>{});
                tg.HapticFeedback.impactOccurred('light');

                tickCount++;
                currentInterval += (tickCount * 3.5); // معادلة التباطؤ الواقعي الفخم
                setTimeout(playTickEffect, currentInterval);
            }
        }
        
        setTimeout(playTickEffect, 80);

        // لحظة الوقوف الحماسي وانطلاق المفرقعات والكونفيتي
        setTimeout(() => {
            winSnd.play().catch(()=>{});
            tg.HapticFeedback.notificationOccurred('success');

            let endCelebrate = Date.now() + (3 * 1000);

            (function burstConfetti() {
                confetti({ particleCount: 6, angle: 60, spread: 55, origin: { x: 0, y: 0.75 } });
                confetti({ particleCount: 6, angle: 120, spread: 55, origin: { x: 1, y: 0.75 } });
                if (Date.now() < endCelebrate) { requestAnimationFrame(burstConfetti); }
            }());

            // إرسال البيانات وإغلاق الويب آب بأمان
            setTimeout(() => {
                tg.sendData(JSON.stringify({
                    prize: wonPrize,
                    mode: mode,
                    amount: parseInt(wonPrize)
                }));
                tg.close();
            }, 2200);

        }, 6000); // متطابق مع زمن الـ transition بالـ CSS
    }
</script>
</body>
</html>
