<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syria Cash - 3D Wheel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #1a2035 0%, #0a0c16 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        /* تصميم الحاوية الثري دي مثل الفيديو تماماً */
        .wheel-container {
            position: relative;
            width: 90vw;
            max-width: 400px;
            height: 90vw;
            max-height: 400px;
            margin-bottom: 40px;
            perspective: 1200px; /* تأثير العمق الثري دي */
        }
        /* المؤشر الذهبي المدبب من الأعلى */
        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%) rotate(180deg);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-bottom: 40px solid #ffcc00;
            z-index: 10;
            filter: drop-shadow(0px 6px 8px rgba(0,0,0,0.7));
        }
        /* العجلة الرئيسية وتأثير الميلان 3D */
        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            /* إطار خارجي فخم وتأثير الإضاءة */
            box-shadow: 
                0 0 0 10px #1e2235, /* إطار داخلي */
                0 0 20px 5px #ffcc00, /* توهج ذهبي */
                0 25px 50px rgba(0,0,0,0.9); /* ظل خارجي */
            transform: rotateX(20deg); /* زاوية الميلان الثري دي */
            transition: transform 4s cubic-bezier(0.1, 0.9, 0.1, 1);
        }
        .btn-spin {
            background: linear-gradient(180deg, #3a3f58 0%, #1e2235 100%);
            color: white;
            border: 2px solid #ffcc00;
            padding: 15px 50px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 35px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-spin:active {
            transform: translateY(3px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .btn-spin:disabled {
            background: #2a2d3d;
            border-color: #555;
            color: #888;
            cursor: not-allowed;
            transform: none;
        }
        .info-box {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            width: 85%;
            max-width: 360px;
            margin-top: 25px;
            font-size: 0.95rem;
            backdrop-filter: blur(10px);
        }
        .gold-text { color: #ffcc00; font-weight: bold; }
    </style>
</head>
<body>

    <div class="wheel-container">
        <div class="pointer"></div>
        <canvas id="wheelCanvas" width="600" height="600"></canvas>
    </div>

    <button class="btn-spin" id="spinBtn" onclick="startSpin()">تدوير العجلة</button>

    <div class="info-box" id="infoBox">
        <span class="gold-text">الوضع الحقيقي نشط</span><br>
        سيتم سحب التكلفة وتسجيل الجائزة في حسابك فوراً.
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode') || 'cash';

    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    
    let prizes = [];
    if(mode === 'refs') {
        prizes = ["50 ليرة", "50 ليرة", "50 ليرة", "50 ليرة", "50 ليرة", "50 ليرة", "50 ليرة", "50 ليرة"];
    } else {
        prizes = ["50 ليرة", "100 ليرة", "200 ليرة", "350 ليرة", "500 ليرة", "75 ليرة", "100 ليرة", "150 ليرة"];
    }

    // نفس ألوان الفيديو الاحترافية بالميلي
    const colors = ["#2c3e50", "#f39c12", "#16a085", "#d35400", "#8e44ad", "#c0392b", "#27ae60", "#2980b9"];
    const numSegments = prizes.length;
    const anglePerSegment = (2 * Math.PI) / numSegments;

    // دالة رسم العجلة بالمؤثرات ثنائية وثلاثية الأبعاد لتشبه الفيديو
    function drawWheel() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // رسم الأقسام ثنائية الأبعاد كأساس
        for (let i = 0; i < numSegments; i++) {
            const angle = i * anglePerSegment;
            ctx.fillStyle = colors[i % colors.length];
            ctx.beginPath();
            ctx.moveTo(300, 300);
            ctx.arc(300, 300, 290, angle, angle + anglePerSegment);
            ctx.fill();
            
            // إضافة النصوص داخل الأقسام بشكل مائل متناسق
            ctx.save();
            ctx.translate(300, 300);
            ctx.rotate(angle + anglePerSegment / 2);
            ctx.textAlign = "right";
            ctx.fillStyle = "#fff";
            ctx.font = "bold 20px Tahoma";
            ctx.fillText(prizes[i], 270, 10);
            ctx.restore();
        }

        // إضافة تأثير الإضاءة (التدرج) ليصبح الشكل ثري دي فخم مثل الفيديو
        const gradient = ctx.createRadialGradient(300, 300, 50, 300, 300, 290);
        gradient.addColorStop(0, "rgba(255, 255, 255, 0.15)");
        gradient.addColorStop(0.5, "rgba(0, 0, 0, 0)");
        gradient.addColorStop(1, "rgba(0, 0, 0, 0.4)");
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(300, 300, 290, 0, 2 * Math.PI);
        ctx.fill();
        
        // الدائرة المركزية الذهبية الفخمة
        ctx.beginPath();
        ctx.arc(300, 300, 40, 0, 2 * Math.PI);
        ctx.fillStyle = '#ffcc00'; // أصفر ذهبي مثل الفيديو تماماً
        ctx.fill();
        ctx.lineWidth = 6;
        ctx.strokeStyle = '#fff';
        ctx.stroke();
    }

    drawWheel();

    function startSpin() {
        document.getElementById('spinBtn').disabled = true;
        
        // تحديد الجائزة عشوائياً (الشفافية والأمان)
        const targetIndex = Math.floor(Math.random() * numSegments);
        const targetPrize = prizes[targetIndex];
        
        const extraRotations = 5 * 360; 
        const targetAngle = extraRotations + (360 - (targetIndex * (360 / numSegments)) - (180 / numSegments));
        
        // تطبيق الدوران وتأثير الميلان 3D بالميلي
        canvas.style.transform = `rotateX(20deg) rotate(${targetAngle}deg)`;
        
        // محاكاة صوت "التكتكة" بالموبايل (Haptic Feedback) مثل الفيديو تماماً
        let ticks = 0;
        const tickInterval = setInterval(() => {
            if(ticks < 25) {
                tg.HapticFeedback.impactOccurred('light');
                ticks++;
            } else {
                clearInterval(tickInterval);
            }
        }, 150);

        // انتهاء الدوران وعرض المفرقعات والنتيجة
        setTimeout(() => {
            tg.HapticFeedback.notificationOccurred('success');
            
            // تأثير الكونفيتي (المفرقعات الملونة) الفخم عند الربح بالميلي
            confetti({
                particleCount: 200,
                spread: 90,
                origin: { y: 0.6 }
            });

            // إرسال النتيجة للبوت وإغلاق الويب آب
            setTimeout(() => {
                tg.sendData(JSON.stringify({
                    prize: targetPrize,
                    mode: mode,
                    amount: parseInt(targetPrize)
                }));
                tg.close();
            }, 2500);

        }, 4000);
    }
</script>
</body>
</html>
