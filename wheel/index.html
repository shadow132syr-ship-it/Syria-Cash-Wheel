<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سوريا كاش - العجلة الملكية 3D</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #111625 0%, #07080d 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* حاوية المنظور ثلاثي الأبعاد المائل بالملي مثل الفيديو */
        .stage-3d {
            perspective: 1000px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .wheel-container {
            position: relative;
            width: 85vw;
            max-width: 380px;
            height: 85vw;
            max-height: 380px;
            /* زاوية ميلان ومظهر العجلة المسطح المائل تماماً مثل الفيديو */
            transform: rotateX(65deg) rotateZ(0deg);
            transform-style: preserve-3d;
            transition: transform 6s cubic-bezier(0.15, 0.85, 0.15, 1);
            border-radius: 50%;
            background: #111;
            box-shadow: 
                0 0 0 12px #ffcc00, 
                0 0 0 15px #222,
                0 30px 50px rgba(0, 0, 0, 0.9);
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }

        /* الكرة البيضاء التي تدور داخل المجرى مثل الفيديو */
        .ball {
            position: absolute;
            width: 16px;
            height: 16px;
            background: radial-gradient(circle at 35% 35%, #fff 0%, #ccc 100%);
            border-radius: 50%;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            display: none; /* تظهر فقط عند الدوران */
        }

        .btn-spin {
            background: linear-gradient(180deg, #ffd700 0%, #b8860b 100%);
            color: #000;
            border: none;
            padding: 14px 60px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
            transition: all 0.2s;
            margin-top: 10px;
        }

        .btn-spin:active {
            transform: scale(0.95);
        }

        .btn-spin:disabled {
            background: #444;
            color: #888;
            border: 2px solid #555;
            box-shadow: none;
            cursor: not-allowed;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            width: 80%;
            max-width: 320px;
            margin-top: 20px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="stage-3d">
        <div class="wheel-container" id="wheelContainer">
            <div class="ball" id="ball"></div>
            <canvas id="wheelCanvas" width="500" height="500"></canvas>
        </div>
    </div>

    <button class="btn-spin" id="spinBtn" onclick="startSpin()">اضغط للتدوير</button>

    <div class="info-box">
        🔑 اللعبة حقيقية وتعتمد على رصيدك أو إحالاتك الحالية داخل البوت.
    </div>

    <audio id="tickSound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav" preload="auto"></audio>
    <audio id="winSound" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-84.wav" preload="auto"></audio>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode') || 'cash';

    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('wheelContainer');
    const ball = document.getElementById('ball');
    const tickSound = document.getElementById('tickSound');
    const winSound = document.getElementById('winSound');

    let prizes = [];
    if(mode === 'refs') {
        prizes = ["50 ليرة", "50 ليرة", "50 ليرة", "50 ليرة", "50 ليرة", "50 ليرة", "50 ليرة", "50 ليرة"];
    } else {
        prizes = ["50 ليرة", "100 ليرة", "200 ليرة", "350 ليرة", "500 ليرة", "750 ليرة", "1000 ليرة", "1500 ليرة"];
    }

    const colors = ["#1e2530", "#34495e", "#2c3e50", "#212f3d", "#1a252f", "#2e4053", "#34495e", "#1c2833"];
    const numSegments = prizes.length;
    const anglePerSegment = (2 * Math.PI) / numSegments;

    function drawWheel() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // رسم خطوط الأقسام الدائرية الفخمة
        for (let i = 0; i < numSegments; i++) {
            const angle = i * anglePerSegment;
            ctx.fillStyle = colors[i % colors.length];
            ctx.beginPath();
            ctx.moveTo(250, 250);
            ctx.arc(250, 250, 245, angle, angle + anglePerSegment);
            ctx.fill();
            
            // إطار ذهبي رقيق لكل قسم لمنع التداخل
            ctx.strokeStyle = "rgba(255, 215, 0, 0.4)";
            ctx.lineWidth = 2;
            ctx.stroke();

            // كتابة النص بشكل مائل ومحاذي للوسط تماماً
            ctx.save();
            ctx.translate(250, 250);
            ctx.rotate(angle + anglePerSegment / 2);
            ctx.textAlign = "right";
            ctx.fillStyle = "#ffcc00";
            ctx.font = "bold 16px Tahoma";
            ctx.fillText(prizes[i], 220, 6);
            ctx.restore();
        }

        // مركز العجلة (الغطاء المعدني الداخلي)
        ctx.beginPath();
        ctx.arc(250, 250, 35, 0, 2 * Math.PI);
        ctx.fillStyle = '#ffcc00';
        ctx.fill();
        ctx.lineWidth = 5;
        ctx.strokeStyle = '#fff';
        ctx.stroke();
    }

    drawWheel();

    function startSpin() {
        document.getElementById('spinBtn').disabled = true;
        ball.style.display = "block";

        const targetIndex = Math.floor(Math.random() * numSegments);
        const targetPrize = prizes[targetIndex];

        // دوران كامل للعجلة (7 لفات كاملة مع زاوية التوقف الدقيقة للقسم)
        const totalRotations = 7 * 360;
        const finalAngle = totalRotations + (360 - (targetIndex * (360 / numSegments)) - (180 / numSegments));

        // لف واجهة الـ 3D بالكامل مع الحفاظ على ميلان المنظور الأفقي
        container.style.transform = `rotateX(65deg) rotateZ(${-finalAngle}deg)`;

        // تشغيل صوت التكتكة بشكل ديناميكي ميكانيكي متناسق مع سرعة العجلة بالميلي
        let currentTickAngle = 0;
        let speed = 15; // سرعة الصوت المبدئية
        
        function playTicks() {
            if (currentTickAngle < finalAngle) {
                tickSound.currentTime = 0;
                tickSound.play().catch(()=>{});
                tg.HapticFeedback.impactOccurred('light');
                
                currentTickAngle += (360 / numSegments);
                // إبطاء سرعة التكتكة تدريجياً لتعطي واقعية التوقف الفخم
                speed += 25; 
                setTimeout(playTicks, speed);
            }
        }
        
        setTimeout(playTicks, 100);

        // انتهاء الدوران، إطلاق الألعاب النارية والكونفيتي وإرجاع النتيجة للبوت
        setTimeout(() => {
            winSound.play().catch(()=>{});
            tg.HapticFeedback.notificationOccurred('success');

            // إطلاق تأثيرات الألعاب النارية والاحتفالات الملونة مثل الفيديو بالملي
            var duration = 3 * 1000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 }
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 }
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());

            // إرسال البيانات فوراً للداتابيز لتأكيد الحساب وإغلاق الصفحة
            setTimeout(() => {
                tg.sendData(JSON.stringify({
                    prize: targetPrize,
                    mode: mode,
                    amount: parseInt(targetPrize)
                }));
                tg.close();
            }, 2500);

        }, 6000); // 6 ثوانٍ من الدوران الواقعي الميكانيكي الفخم
    }
</script>
</body>
</html>
