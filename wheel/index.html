<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>عجلة سوريا كاش 🎡</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --gold: #FFD700;
    --gold2: #FFA500;
    --dark: #0a0a0f;
    --card: #13131f;
    --glow: rgba(255,215,0,0.35);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--dark);
    font-family: 'Cairo', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    user-select: none;
    -webkit-user-select: none;
    padding: 20px 0;
  }

  /* ── Stars background ── */
  .stars {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
  }
  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: #fff;
    border-radius: 50%;
    animation: twinkle var(--d,3s) infinite var(--delay,0s);
    opacity: 0;
  }
  @keyframes twinkle {
    0%,100%{opacity:0} 50%{opacity:var(--op,0.8)}
  }

  /* ── Main container ── */
  .container {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    align-items: center; gap: 20px;
    width: 100%;
  }

  h1 {
    font-size: clamp(1.6rem,5vw,2.2rem);
    font-weight: 900;
    background: linear-gradient(135deg, #FFD700, #FF8C00, #FFD700);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s linear infinite;
    background-size: 200%;
  }
  @keyframes shimmer { 0%{background-position:0%} 100%{background-position:200%} }

  /* ── Wheel wrapper ── */
  .wheel-wrapper {
    position: relative;
    width: min(360px, 90vw);
    height: min(360px, 90vw);
    margin-top: 15px;
  }

  /* glow ring */
  .wheel-wrapper::before {
    content:'';
    position:absolute; inset:-12px;
    border-radius:50%;
    background: conic-gradient(from 0deg, #FFD700, #FF4500, #9b59b6, #3498db, #2ecc71, #FFD700);
    animation: spin-glow 8s linear infinite;
    opacity: 0.4;
    filter: blur(8px);
  }
  @keyframes spin-glow { to{transform:rotate(360deg)} }

  /* ── Canvas ── */
  #wheelCanvas {
    position: relative; z-index:2;
    border-radius: 50%;
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 15px var(--glow));
    touch-action: none;
  }
  #wheelCanvas.spinning { cursor: not-allowed; }

  /* ── السهم العلوي الثابت ── */
  .pointer {
    position: absolute;
    top: -18px; 
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    width: 36px;
    height: 46px;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.9));
  }

  /* ── الدويرة الصفرا البديلة في المنتصف بالملي مع نبض فخم ── */
  .center-circle {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    width: 58px;
    height: 58px;
    border-radius: 50%;
    background: radial-gradient(circle, #FFE043 0%, #FFB000 80%, #CC8000 100%);
    border: 3.5px solid #ffffff;
    box-shadow: 0 0 20px #FFD700, inset 0 2px 4px rgba(255,255,255,0.6), 0 4px 10px rgba(0,0,0,0.5);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    transition: transform 0.15s;
    animation: circle-pulse 1.8s ease-in-out infinite;
  }
  @keyframes circle-pulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 15px #FFD700, inset 0 2px 4px rgba(255,255,255,0.6); }
    50% { transform: translate(-50%, -50%) scale(1.06); box-shadow: 0 0 28px #FF8C00, inset 0 2px 4px rgba(255,255,255,0.8); }
  }
  .center-circle.spinning { animation: spin-btn 0.4s linear infinite; }
  @keyframes spin-btn { to{transform:translate(-50%,-50%) rotate(360deg)} }

  /* ── Controls ── */
  .controls {
    display: flex; gap: 12px; justify-content: center; width: 100%;
  }

  .btn {
    padding: 11px 40px;
    border-radius: 50px;
    border: 2px solid var(--gold);
    background: transparent;
    color: var(--gold);
    font-family: 'Cairo', sans-serif;
    font-size: 1rem; font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    position: relative; overflow: hidden;
  }
  .btn::before {
    content:''; position:absolute; inset:0;
    background: linear-gradient(135deg,#FFD700,#FF8C00);
    opacity:0; transition: opacity 0.2s;
  }
  .btn:hover { color:#000; }
  .btn:hover::before { opacity:1; }
  .btn span { position:relative; z-index:1; }
  .btn.primary {
    background: linear-gradient(135deg,#FFD700,#FF8C00);
    color: #000;
  }
  .btn:disabled { opacity:0.4; cursor:not-allowed; }

  /* ── خانة عداد اللفات المجانية المتوفرة ── */
  .spins-counter-card {
    background: var(--card);
    border: 1px solid rgba(255, 215, 0, 0.25);
    border-radius: 16px;
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
    font-weight: 700;
    font-size: 0.95rem;
    color: #fff;
  }
  .spins-badge {
    background: linear-gradient(135deg, #FFD700, #FF8C00);
    color: #000;
    padding: 2px 12px;
    border-radius: 20px;
    font-weight: 900;
  }

  /* ── قائمة عرض الجوائز بالأسفل بشكل شبكي احترافي ── */
  .rewards-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    width: min(360px, 92vw);
    margin-top: 5px;
  }
  .reward-box {
    background: var(--card);
    border-radius: 10px;
    padding: 8px 4px;
    text-align: center;
    font-size: 0.75rem;
    font-weight: 700;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow: 0 3px 6px rgba(0,0,0,0.3);
  }

  /* ── Result overlay ── */
  .result-overlay {
    position: fixed; inset:0; z-index:100;
    background: rgba(0,0,0,0.85);
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none;
    transition: opacity 0.4s;
    backdrop-filter: blur(8px);
  }
  .result-overlay.show { opacity:1; pointer-events:all; }

  .result-card {
    background: var(--card);
    border: 2px solid var(--gold);
    border-radius: 24px;
    padding: 35px 40px;
    text-align: center;
    box-shadow: 0 0 50px var(--glow);
    transform: scale(0.7);
    transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
    max-width: 85vw;
  }
  .result-overlay.show .result-card { transform: scale(1); }
  .result-emoji { font-size: 3.5rem; margin-bottom: 8px; animation: bounce 0.6s ease infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .result-text {
    font-size: 2.2rem; font-weight: 900;
    background: linear-gradient(135deg,#FFD700,#FF8C00);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
  }

  /* ── Speed indicator ── */
  .speed-bar-wrap {
    width: min(280px,80vw);
    background: #1a1a2e;
    border-radius: 50px;
    height: 6px;
    overflow: hidden;
  }
  .speed-bar {
    height: 100%;
    background: linear-gradient(90deg,#FFD700,#FF4500);
    width: 0%;
    transition: width 0.1s;
  }

  .sound-toggle {
    position:fixed; top:16px; left:16px; z-index:50;
    width:38px; height:38px; border-radius:50%;
    background:var(--card); border:1px solid #333;
    display:flex; align-items:center; justify-content:center;
    font-size:1.1rem; cursor:pointer;
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="sound-toggle" id="soundToggle">🔊</div>

<div class="container">
  <h1>🎡 عجلة الحظ الكبرى</h1>

  <div class="wheel-wrapper" id="wheelWrapper">
    <canvas id="wheelCanvas" width="400" height="400"></canvas>
    
    <div class="pointer">
      <svg width="36" height="46" viewBox="0 0 36 46">
        <defs>
          <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#FFF7C2"/>
            <stop offset="40%" stop-color="#FFD700"/>
            <stop offset="100%" stop-color="#FF4500"/>
          </linearGradient>
        </defs>
        <path d="M18,44 L2,4 L34,4 Z" fill="url(#goldGrad)" stroke="#000" stroke-width="1.5"/>
        <circle cx="18" cy="4" r="3" fill="#FFF"/>
        <circle cx="18" cy="42" r="4" fill="#FF4500" stroke="#000" stroke-width="1"/>
      </svg>
    </div>
    
    <div class="center-circle" id="centerCircle">🎯</div>
  </div>

  <div class="speed-bar-wrap"><div class="speed-bar" id="speedBar"></div></div>

  <div class="controls">
    <button class="btn primary" id="spinBtn"><span>🎰 أدر العجلة</span></button>
  </div>

  <div class="spins-counter-card">
    <span>اللفات المجانية المتاحة لك:</span>
    <span class="spins-badge" id="availSpins">1 محاولة</span>
  </div>

  <div class="rewards-grid">
    <div class="reward-box" style="border-bottom: 3px solid #212121;">💵 50 ليرة</div>
    <div class="reward-box" style="border-bottom: 3px solid #00bcd4;">⚡ 100 ليرة</div>
    <div class="reward-box" style="border-bottom: 3px solid #4caf50;">💰 200 ليرة</div>
    <div class="reward-box" style="border-bottom: 3px solid #e67e22;">🌟 250 ليرة</div>
    <div class="reward-box" style="border-bottom: 3px solid #9c27b0;">✨ 350 ليرة</div>
    <div class="reward-box" style="border-bottom: 3px solid #e91e63;">🎁 500 ليرة</div>
    <div class="reward-box" style="border-bottom: 3px solid #3f51b5;">🚀 750 ليرة</div>
    <div class="reward-box" style="border-bottom: 3px solid #ffeb3b; color: #ffeb3b;">👑 1000 ليرة</div>
    <div class="reward-box" style="border-bottom: 3px solid #673ab7;">💎 1500 ليرة</div>
  </div>
</div>

<div class="result-overlay" id="resultOverlay">
  <div class="result-card">
    <div class="result-emoji" id="resultEmoji">🎉</div>
    <div style="color: #aaa; font-size: 0.9rem; margin-bottom: 5px;">مبروك! لقد فزت بـ</div>
    <div class="result-text" id="resultText">—</div>
    <br>
    <p style="color: #666; font-size: 0.8rem;">يتم الآن إضافة كاش الرصيد لحسابك...</p>
  </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const items = [
  { label:"50 ليرة 💵", color:"#212121" }, 
  { label:"100 ليرة ⚡", color:"#00bcd4" },
  { label:"200 ليرة 💰", color:"#4caf50" },
  { label:"250 ليرة 🌟", color:"#e67e22" },
  { label:"350 ليرة ✨", color:"#9c27b0" },
  { label:"500 ليرة 🎁", color:"#e91e63" },
  { label:"750 ليرة 🚀", color:"#3f51b5" },
  { label:"1000 ليرة 👑", color:"#ffeb3b" },
  { label:"1500 ليرة 💎", color:"#673ab7" }
];

let angle = 0;
let spinning = false;
let soundOn = true;
let idleAngle = 0;

// AUDIO GENERATOR
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}
function playTick() {
  if (!soundOn) return;
  try {
    const ctx = getAudioCtx();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 650 + Math.random()*300;
    o.type = 'triangle';
    g.gain.setValueAtTime(0.15, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.06);
    o.start(); o.stop(ctx.currentTime+0.06);
  } catch(e){}
}
function playWin() {
  if (!soundOn) return;
  try {
    const ctx = getAudioCtx();
    [523, 659, 784, 1047].forEach((f, i) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = f; o.type = 'sine';
      const t = ctx.currentTime + i * 0.1;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.2, t + 0.04);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      o.start(t); o.stop(t + 0.3);
    });
  } catch(e){}
}

// STARS Background
const starsEl = document.getElementById('stars');
for(let i=0;i<100;i++){
  const s=document.createElement('div'); s.className='star';
  s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;
    --d:${2+Math.random()*3}s;--delay:${Math.random()*4}s;--op:${0.3+Math.random()*0.7};
    width:${1+Math.random()*2}px;height:${1+Math.random()*2}px`;
  starsEl.appendChild(s);
}

// CANVAS DRAW WHEEL
const canvas = document.getElementById('wheelCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height, R = W/2;

function drawWheel(currentAngle) {
  const n = items.length;
  const arc = (2*Math.PI)/n;
  ctx.clearRect(0,0,W,H);

  items.forEach((item,i) => {
    const start = currentAngle + i*arc;
    const end   = start + arc;

    ctx.beginPath();
    ctx.moveTo(R,R);
    ctx.arc(R,R,R-5,start,end);
    ctx.closePath();
    ctx.fillStyle = item.color;
    ctx.fill();

    const grad = ctx.createRadialGradient(R,R,R*0.15,R,R,R-5);
    grad.addColorStop(0,'rgba(255,255,255,0.12)');
    grad.addColorStop(1,'rgba(0,0,0,0.22)');
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.lineWidth = 1.8;
    ctx.stroke();

    ctx.save();
    ctx.translate(R,R);
    ctx.rotate(start + arc/2);
    ctx.textAlign = 'right';
    ctx.fillStyle = (item.color === '#ffeb3b') ? '#111' : '#fff';
    
    const fs = Math.min(13, 240/item.label.length);
    ctx.font = `bold ${fs}px Cairo, sans-serif`;
    ctx.shadowColor='rgba(0,0,0,0.7)'; ctx.shadowBlur=3;
    ctx.fillText(item.label, R-18, 5);
    ctx.restore();
  });

  // طوق خارجي
  ctx.beginPath();
  ctx.arc(R,R,R-3,0,2*Math.PI);
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 5;
  ctx.stroke();

  // النقاط المضيئة الأطراف
  const n2 = items.length * 2;
  for(let i=0;i<n2;i++){
    const a = currentAngle + (i/n2)*2*Math.PI;
    const x = R + (R-6)*Math.cos(a);
    const y = R + (R-6)*Math.sin(a);
    ctx.beginPath();
    ctx.arc(x,y,3,0,2*Math.PI);
    ctx.fillStyle = i%2===0?'#FFD700':'#fff';
    ctx.fill();
  }
}

drawWheel(angle);

// SPIN CONTROL (موجه للـ 50 ليرة دائماً)
function spinWheel() {
  if(spinning) return;
  spinning = true;
  getAudioCtx();

  document.getElementById('spinBtn').disabled = true;
  document.getElementById('wheelCanvas').classList.add('spinning');
  document.getElementById('centerCircle').classList.add('spinning');

  const n = items.length;
  const arc = (2*Math.PI)/n;
  const chosenIndex = 0; // 50 ليرة ثابتة

  const extraSpins = (9 + Math.random()*3) * 2 * Math.PI;
  const segCenter = chosenIndex * arc + arc/2;
  const targetAngle = angle + extraSpins + (2*Math.PI - ((angle % (2*Math.PI)) + segCenter + Math.PI/2 - 2*Math.PI) % (2*Math.PI));

  const startAngle = angle;
  const totalChange = targetAngle - startAngle;
  const duration = 5500; 
  const startTime = performance.now();

  let lastTickAngle = angle;

  function animate(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed/duration, 1);

    const eased = easeOutCubic(progress);
    const newAngle = startAngle + totalChange * eased;
    angle = newAngle;

    const speed = Math.abs((newAngle - lastTickAngle));
    document.getElementById('speedBar').style.width = Math.min(speed*850,100)+'%';

    const tickAngle = newAngle % arc;
    const prevTickAngle = lastTickAngle % arc;
    if(tickAngle < prevTickAngle && speed > 0.01) playTick();

    lastTickAngle = newAngle;
    drawWheel(newAngle);

    if(progress < 1) {
      requestAnimationFrame(animate);
    } else {
      angle = newAngle;
      spinning = false;
      document.getElementById('wheelCanvas').classList.remove('spinning');
      document.getElementById('centerCircle').classList.remove('spinning');
      document.getElementById('speedBar').style.width = '0%';
      showResult(items[chosenIndex]);
    }
  }
  requestAnimationFrame(animate);
}

function easeOutCubic(t) { return 1 - Math.pow(1-t, 4); }

// SHOW RESULT
function showResult(item) {
  playWin();
  spawnConfetti();

  document.getElementById('resultText').textContent = item.label;
  document.getElementById('resultOverlay').classList.add('show');

  setTimeout(() => {
    tg.sendData(JSON.stringify({
      prize: item.label,
      amount: 50
    }));
    tg.close();
  }, 2400);
}

// CONFETTI EFFECT
function spawnConfetti() {
  const colors = ['#FFD700','#FF6B6B','#4ECDC4','#45B7D1','#fff'];
  for(let i=0;i<70;i++){
    const c = document.createElement('div');
    c.className = 'confetti-piece';
    c.style.cssText=`
      left:${Math.random()*100}vw; top:0;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:${Math.random()>0.5?'50%':'2px'};
      width:${6+Math.random()*8}px; height:${8+Math.random()*12}px;
      --cf-dur:${1.8+Math.random()*2}s; --cf-delay:${Math.random()*0.5}s;
    `;
    document.body.appendChild(c);
    c.addEventListener('animationend',()=>c.remove());
  }
}

// LISTENERS
canvas.addEventListener('click', spinWheel);
document.getElementById('spinBtn').addEventListener('click', spinWheel);
document.getElementById('centerCircle').addEventListener('click', spinWheel);
document.getElementById('soundToggle').addEventListener('click',()=>{
  soundOn=!soundOn;
  document.getElementById('soundToggle').textContent=soundOn?'🔊':'🔇';
});

// IDLE LOOP
(function idleLoop(){
  if(!spinning){
    idleAngle += 0.0008;
    drawWheel(angle + idleAngle);
  }
  requestAnimationFrame(idleLoop);
})();
</script>
</body>
</html>
