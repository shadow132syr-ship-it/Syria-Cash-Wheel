<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>العجلة الملكية الكبرى 3D</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #161a26 0%, #07090e 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* حاوية العجلة بمنظور 3D سينمائي فخم ثابت ومتناسق */
        .stage-3d {
            perspective: 1400px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .wheel-wrapper {
            position: relative;
            width: 90vw;
            max-width: 390px;
            height: 90vw;
            max-width: 390px;
            /* إمالة خفيفة وذكية لإعطاء مظهر ثلاثي الأبعاد فخم جداً بدون تشويه */
            transform: rotateX(12deg);
            transform-style: preserve-3d;
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transition: transform 6s cubic-bezier(0.15, 0.85, 0.15, 1);
            filter: drop-shadow(0 25px 35px rgba(0, 0, 0, 0.75));
        }

        /* السهم الذهبي الواقعي مع التظليل العميق */
        .premium-pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 38px;
            height: 48px;
            background: linear-gradient(185deg, #fff 0%, #ffcc00 40%, #b8860b 80%, #553300 100%);
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 30;
            filter: drop-shadow(0 6px 6px rgba(0,0,0,0.6));
            transform-origin: 50% 0%;
        }

        @keyframes pointer-hit {
            0% { transform: translateX(-50%) rotate(0deg); }
            50% { transform: translateX(-50%) rotate(-18deg); }
            100% { transform: translateX(-50%) rotate(0deg); }
        }

        .premium-pointer.active-tick {
            animation: pointer-hit 0.12s ease;
        }

        /* زر ابدأ التدوير الذهبي النيون اللامع */
        .btn-premium {
            background: linear-gradient(180deg, #ffe555 0%, #d4af37 50%, #aa7c11 100%);
            color: #06080c;
            border: 1px solid #fff;
            padding: 15px 65px;
            font-size: 1.25rem;
            font-weight: 900;
            border-radius: 35px;
            cursor: pointer;
            box-shadow: 
                0 0 15px rgba(255, 215, 0, 0.4),
                0 8px 25px rgba(0,0,0,0.5);
            transition: all 0.2s ease;
            text-shadow: 0 1px 2px rgba(255,255,255,0.5);
        }

        .btn-premium:active {
            transform: scale(0.95);
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        .btn-premium:disabled {
            background: linear-gradient(180deg, #333 0%, #222 100%);
            color: #666;
            border-color: #444;
            box-shadow: none;
            cursor: not-allowed;
        }

        .status-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 16px;
            padding: 12px 25px;
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .gold-glow { color: #ffcc00; font-weight: bold; text-shadow: 0 0 5px rgba(255,204,0,0.3); }
    </style>
</head>
<body>

    <div class="stage-3d">
        <div class="wheel-wrapper">
            <div class="premium-pointer" id="pointerDevice"></div>
            <canvas id="premiumCanvas" width="600" height="600"></canvas>
        </div>
    </div>

    <button class="btn-premium" id="spinBtn" onclick="executeSpin()">ابدأ التدوير</button>

    <div class="status-box">
        <span class="gold-glow">الوضع الملكي نشط</span><br>
        انتظرونا... الجوائز تُسجّل مباشرة داخل حسابك بالبوت.
    </div>

    <audio id="tickSound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav" preload="auto"></audio>
    <audio id="winSound" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-84.wav" preload="auto"></audio>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode') || 'cash';

    const canvas = document.getElementById('premiumCanvas');
    const ctx = canvas.getContext('2d');
    const pointerDevice = document.getElementById('pointerDevice');
    const tickSound = document.getElementById('tickSound');
    const winSound = document.getElementById('winSound');

    let prizes = [];
    if(mode === 'refs') {
        prizes = ["50 ليرة", "50 ليرة", "50 ليرة", "50 ليرة", "50 ليرة", "50 ليرة", "50 ليرة", "50 ليرة"];
    } else {
        prizes = ["50 ليرة", "100 ليرة", "200 ليرة", "350 ليرة", "500 ليرة", "750 ليرة", "1000 ليرة", "1500 ليرة"];
    }

    // ألوان داكنة ملكية وخلفية فخمة لتبرز الإضاءة والذهب بالملي
    const colors = ["#131722", "#1b2030", "#0f121a", "#1b2030", "#131722", "#1b2030", "#0f121a", "#1b2030"];
    const numSeg = prizes.length;
    const segAngle = (2 * Math.PI) / numSeg;

    // دالة رسم تلوين واقعي للتاج المصغر فوق الأرقام الكبيرة
    function drawCrown(x, y, size) {
        ctx.fillStyle = "#ffcc00";
        ctx.beginPath();
        ctx.moveTo(x - size, y);
        ctx.lineTo(x - size, y - size);
        ctx.lineTo(x - size/2, y - size/2);
        ctx.lineTo(x, y - size * 1.2);
        ctx.lineTo(x + size/2, y - size/2);
        ctx.lineTo(x + size, y - size);
        ctx.lineTo(x + size, y);
        ctx.closePath();
        ctx.fill();
    }

    function renderRoyalWheel() {
        ctx.clearRect(0, 0, 600, 600);
        
        // 1. رسم الإطار الخارجي المعدني (Chrome Silver 3D Effect)
        let chromeGrad = ctx.createLinearGradient(0, 0, 600, 600);
        chromeGrad.addColorStop(0, '#f0f0f0');
        chromeGrad.addColorStop(0.2, '#7a7a7a');
        chromeGrad.addColorStop(0.4, '#ffffff');
        chromeGrad.addColorStop(0.6, '#444444');
        chromeGrad.addColorStop(0.8, '#ffffff');
        chromeGrad.addColorStop(1, '#666666');
        
        ctx.beginPath();
        ctx.arc(300, 300, 295, 0, 2 * Math.PI);
        ctx.fillStyle = chromeGrad;
        ctx.shadowColor = "rgba(0,0,0,0.5)";
        ctx.shadowBlur = 20;
        ctx.fill();
        ctx.shadowBlur = 0; // ريست للظل

        // 2. إطار داخلي أسود فخم يحمل النقط المضيئة (LED Neon Dots)
        ctx.beginPath();
        ctx.arc(300, 300, 275, 0, 2 * Math.PI);
        ctx.fillStyle = "#090b11";
        ctx.fill();

        // رسم النقط المضيئة الملونة حول الإطار بالملي
        for (let i = 0; i < 24; i++) {
            let dotAngle = (i * (2 * Math.PI)) / 24;
            let dotX = 300 + 285 * Math.cos(dotAngle);
            let dotY = 300 + 285 * Math.sin(dotAngle);
            ctx.beginPath();
            ctx.arc(dotX, dotY, 4, 0, 2 * Math.PI);
            ctx.fillStyle = i % 2 === 0 ? "#ffcc00" : "#00ffcc";
            ctx.fill();
        }

        // 3. رسم الأقسام والنصوص والتأثيرات الداخلية
        for (let i = 0; i < numSeg; i++) {
            const angle = i * segAngle;
            
            ctx.fillStyle = colors[i % colors.length];
            ctx.beginPath();
            ctx.moveTo(300, 300);
            ctx.arc(300, 300, 270, angle, angle + segAngle);
            ctx.fill();
            
            // الفواصل الذهبية الـ 3D
            ctx.strokeStyle = "rgba(255, 215, 0, 0.25)";
            ctx.lineWidth = 3;
            ctx.stroke();

            // إضاءة داخلية من حواف القسم للداخل ليعطي تأثير تظليل وعمق واقعي
            ctx.save();
            ctx.translate(300, 300);
            ctx.rotate(angle + segAngle / 2);
            
            // تخصيص النصوص والتاج للمبالغ الملكية الكبيرة (1000 و 1500 ليرة)
            let isGrand = (prizes[i] === "1000 ليرة" || prizes[i] === "1500 ليرة");
            
            if (isGrand) {
                ctx.fillStyle = "#ffcc00";
                ctx.font = "shadowBlur 5px; bold 20px Arial";
                // رسم التاج فوق النص الملكي بالملي
                drawCrown(210, -18, 7);
            } else {
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 18px Arial";
            }
            
            ctx.textAlign = "right";
            ctx.fillText(prizes[i], 250, 6);
            ctx.restore();
        }

        // 4. رسم الماسة المركزية الكبرى ثلاثية الأبعاد الفخمة (The Giant Diamond Center)
        // تدرج شعاعي يعطي بريق الألماس والشفافية العاكسة للضوء
        let diamondGrad = ctx.createRadialGradient(300, 300, 5, 300, 300, 45);
        diamondGrad.addColorStop(0, '#ffffff');
        diamondGrad.addColorStop(0.2, '#e0f7fa');
        diamondGrad.addColorStop(0.5, '#80deea');
        diamondGrad.addColorStop(0.8, '#00acc1');
        diamondGrad.addColorStop(1, '#006064');

        ctx.beginPath();
        ctx.arc(300, 300, 45, 0, 2 * Math.PI);
        ctx.fillStyle = diamondGrad;
        ctx.shadowColor = "rgba(0, 242, 254, 0.6)";
        ctx.shadowBlur = 15;
        ctx.fill();
        ctx.shadowBlur = 0;

        // نقش خطوط الألماس المتقاطعة لتبدو ماسة حقيقية هندسية
        ctx.strokeStyle = "rgba(255, 255, 255, 0.6)";
        ctx.lineWidth = 1.5;
        for (let d = 0; d < 8; d++) {
            let dAngle = (d * Math.PI) / 4;
            ctx.beginPath();
            ctx.moveTo(300, 300);
            ctx.lineTo(300 + 45 * Math.cos(dAngle), 300 + 45 * Math.sin(dAngle));
            ctx.stroke();
        }
        
        // حلقة ذهبية تحيط بالماسة الفخمة
        ctx.beginPath();
        ctx.arc(300, 300, 45, 0, 2 * Math.PI);
        ctx.strokeStyle = '#ffcc00';
        ctx.lineWidth = 4;
        ctx.stroke();
    }

    renderRoyalWheel();

    function executeSpin() {
        document.getElementById('spinBtn').disabled = true;

        const targetIdx = Math.floor(Math.random() * numSeg);
        const targetPrize = prizes[targetIdx];

        // دوران كامل وسريع ومبهج (7 لفات مشوقة بالملي)
        const rotations = 7 * 360;
        const finalAngleDeg = rotations + (360 - (targetIdx * (360 / numSeg)) - (180 / numSeg));

        canvas.style.transform = `rotate(${finalAngleDeg}deg)`;

        // محاكاة حركة السهم الذهبي وتكتكة الصوت الميكانيكي مع تتابع الأقسام
        let ticksCount = 0;
        const maxTicks = 56; 
        let currentDelay = 50;

        function playMechanicalTick() {
            if (ticksCount < maxTicks) {
                // تفعيل صدمة وحركة السهم
                pointerDevice.classList.remove('active-tick');
                void pointerDevice.offsetWidth; 
                pointerDevice.classList.add('active-tick');

                // تشغيل الصوت والـ Haptic
                tickSound.currentTime = 0;
                tickSound.play().catch(()=>{});
                tg.HapticFeedback.impactOccurred('light');

                ticksCount++;
                // معادلة إبطاء الميكانيك الفخم التدريجي
                currentDelay += (ticksCount * 3.5);
                setTimeout(playMechanicalTick, currentDelay);
            }
        }
        
        setTimeout(playMechanicalTick, 100);

        // لحظة الفوز وإطلاق الألعاب النارية الاحتفالية الكبرى
        setTimeout(() => {
            winSound.play().catch(()=>{});
            tg.HapticFeedback.notificationOccurred('success');

            // إطلاق عاصفة من الألعاب النارية والكونفيتي الملون من زوايا الشاشة فوراً
            var duration = 3 * 1000;
            var end = Date.now() + duration;

            (function animationFrameLoop() {
                confetti({ particleCount: 6, angle: 60, spread: 60, origin: { x: 0, y: 0.75 } });
                confetti({ particleCount: 6, angle: 120, spread: 60, origin: { x: 1, y: 0.75 } });
                if (Date.now() < end) { requestAnimationFrame(animationFrameLoop); }
            }());

            // تسليم الجائزة للبوت وإغلاق الشاشة بأمان
            setTimeout(() => {
                tg.sendData(JSON.stringify({
                    prize: targetPrize,
                    mode: mode,
                    amount: parseInt(targetPrize)
                }));
                tg.close();
            }, 2300);

        }, 6000); // 6 ثوانٍ من الحماس والتشويق الملكي
    }
</script>
</body>
</html>
