<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سوريا كاش - العجلة الملكية</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0d111b;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* حاوية دائرية مثالية بدون تمطيط أو ميلان يمرض العين */
        .wheel-wrapper {
            position: relative;
            width: 88vw;
            max-width: 360px;
            height: 88vw;
            max-width: 360px;
            margin-bottom: 30px;
        }

        /* إطار الكروم الفضي واللمعة اللامعة مثل الفيديو تماماً */
        .outer-border {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            padding: 12px;
            box-sizing: border-box;
            background: linear-gradient(135deg, #f0f0f0 0%, #7a7a7a 25%, #ffffff 50%, #4a4a4a 75%, #cccccc 100%);
            box-shadow: 
                0 15px 35px rgba(0,0,0,0.6),
                inset 0 4px 10px rgba(255,255,255,0.6),
                0 0 25px rgba(255, 215, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wheel-container {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            background: #151a26;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transform: rotate(0deg);
            transition: transform 5s cubic-bezier(0.25, 1, 0.5, 1); /* دوران سلس وسريع */
        }

        /* المؤشر الفخم من الأعلى (الوتد الذهبي المتأرجح) */
        .pointer {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 32px;
            height: 42px;
            background: linear-gradient(180deg, #fff 0%, #ffcc00 40%, #cc9900 100%);
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 20;
            filter: drop-shadow(0 4px 5px rgba(0,0,0,0.5));
            transform-origin: 50% 0%;
        }

        /* حركة ضربة المؤشر الخفيفة أثناء التكتكة */
        @keyframes hit-tick {
            0% { transform: translateX(-50%) rotate(0deg); }
            50% { transform: translateX(-50%) rotate(-15deg); }
            100% { transform: translateX(-50%) rotate(0deg); }
        }

        .pointer.hit {
            animation: hit-tick 0.15s ease;
        }

        /* زر التدوير الذهبي النظيف */
        .btn-spin {
            background: linear-gradient(180deg, #ffcc00 0%, #d4af37 100%);
            color: #0b0e14;
            border: none;
            padding: 14px 55px;
            font-size: 1.15rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(255, 204, 0, 0.3);
            transition: all 0.2s ease;
        }

        .btn-spin:active {
            transform: scale(0.96);
            box-shadow: 0 3px 10px rgba(255, 204, 0, 0.2);
        }

        .btn-spin:disabled {
            background: #252a37;
            color: #5c6479;
            box-shadow: none;
            cursor: not-allowed;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 16px;
            padding: 14px;
            text-align: center;
            width: 82%;
            max-width: 320px;
            margin-top: 25px;
            font-size: 0.85rem;
            line-height: 1.4;
        }
        .gold { color: #ffcc00; font-weight: bold; }
    </style>
</head>
<body>

    <div class="wheel-wrapper">
        <div class="pointer" id="pin"></div>
        <div class="outer-border">
            <div class="wheel-container">
                <canvas id="wheel" width="500" height="500"></canvas>
            </div>
        </div>
    </div>

    <button class="btn-spin" id="spinBtn" onclick="spin()">ابدأ التدوير</button>

    <div class="info-box">
        <span class="gold">الوضع الحقيقي نشط</span><br>
        سيتم تسجيل الجائزة وخصم الرصيد تلقائياً داخل البوت.
    </div>

    <audio id="sndTick" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav" preload="auto"></audio>
    <audio id="sndWin" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-84.wav" preload="auto"></audio>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode') || 'cash';

    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const pin = document.getElementById('pin');
    const sndTick = document.getElementById('sndTick');
    const sndWin = document.getElementById('sndWin');

    let prizes = [];
    if(mode === 'refs') {
        prizes = ["50 ليرة", "50 ليرة", "50 ليرة", "50 ليرة", "50 ليرة", "50 ليرة", "50 ليرة", "50 ليرة"];
    } else {
        prizes = ["50 ليرة", "100 ليرة", "200 ليرة", "350 ليرة", "500 ليرة", "750 ليرة", "1000 ليرة", "1500 ليرة"];
    }

    // ألوان ملكية فخمة ومتناسقة (أزرق غامق، بنفسجي، رمادي غامق، وتدرجات نيوت)
    const colors = ["#1a1f2c", "#2c3e50", "#1e272c", "#34495e", "#161b22", "#243342", "#2c3e50", "#11161b"];
    const numSeg = prizes.length;
    const segAngle = (2 * Math.PI) / numSeg;
    let currentDegree = 0;

    function draw() {
        ctx.clearRect(0, 0, 500, 500);
        
        for (let i = 0; i < numSeg; i++) {
            const angle = i * segAngle;
            
            // رسم القسم
            ctx.fillStyle = colors[i % colors.length];
            ctx.beginPath();
            ctx.moveTo(250, 250);
            ctx.arc(250, 250, 240, angle, angle + segAngle);
            ctx.fill();
            
            // خطوط الفواصل الذهبية النظيفة بين الأقسام
            ctx.strokeStyle = "rgba(255, 204, 0, 0.3)";
            ctx.lineWidth = 2;
            ctx.stroke();

            // كتابة النص بشكل ملكي مقروء ومحاذي تماماً
            ctx.save();
            ctx.translate(250, 250);
            ctx.rotate(angle + segAngle / 2);
            ctx.textAlign = "right";
            ctx.fillStyle = "#ffffff";
            // نصوص ذهبية للجوائز العالية
            if(prizes[i] === "1000 ليرة" || prizes[i] === "1500 ليرة") ctx.fillStyle = "#ffcc00";
            ctx.font = "bold 16px Arial";
            ctx.fillText(prizes[i], 215, 6);
            ctx.restore();
        }

        // الغطاء المركزي اللامع (الزر الذهبي الداخلي بالمنتصف)
        ctx.beginPath();
        ctx.arc(250, 250, 32, 0, 2 * Math.PI);
        ctx.fillStyle = '#ffcc00';
        ctx.fill();
        ctx.lineWidth = 4;
        ctx.strokeStyle = '#ffffff';
        ctx.stroke();
    }

    draw();

    function spin() {
        document.getElementById('spinBtn').disabled = true;

        const targetIdx = Math.floor(Math.random() * numSeg);
        const targetPrize = prizes[targetIdx];

        // 6 لفات كاملة سريعة ونظيفة مع زاوية الوقوف الصحيحة
        const rotations = 6 * 360;
        const finalAngleDeg = rotations + (360 - (targetIdx * (360 / numSeg)) - (180 / numSeg));

        canvas.style.transform = `rotate(${finalAngleDeg}deg)`;

        // معالجة صوت التكتكة الميكانيكي واهتزاز المؤشر العلوي مع حركة الأقسام
        let ticksTriggered = 0;
        const totalTicksEstimated = 48; 
        let tickDelay = 60; // سرعة تكتكة بدئية ممتازة

        function doTick() {
            if (ticksTriggered < totalTicksEstimated) {
                // تفعيل أنيميشن ضرب المؤشر
                pin.classList.remove('hit');
                void pin.offsetWidth; // ريست للأنيميشن
                pin.classList.add('hit');

                // تشغيل الصوت والهزاز
                sndTick.currentTime = 0;
                sndTick.play().catch(()=>{});
                tg.HapticFeedback.impactOccurred('light');

                ticksTriggered++;
                // إبطاء التكتكة تدريجياً بالتزامن مع توقف العجلة الفخم
                tickDelay += (ticksTriggered * 4);
                setTimeout(doTick, tickDelay);
            }
        }
        
        setTimeout(doTick, 150);

        // انتهاء الدوران، الاحتفال، وإرسال البيانات
        setTimeout(() => {
            sndWin.play().catch(()=>{});
            tg.HapticFeedback.notificationOccurred('success');

            // إطلاق المفرقعات والكونفيتي الجانبي الفخم من اليمين واليسار (مثل الألعاب النارية)
            var duration = 2.5 * 1000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({ particleCount: 4, angle: 60, spread: 55, origin: { x: 0, y: 0.8 } });
                confetti({ particleCount: 4, angle: 120, spread: 55, origin: { x: 1, y: 0.8 } });
                if (Date.now() < end) { requestAnimationFrame(frame); }
            }());

            // العودة للبوت
            setTimeout(() => {
                tg.sendData(JSON.stringify({
                    prize: targetPrize,
                    mode: mode,
                    amount: parseInt(targetPrize)
                }));
                tg.close();
            }, 2200);

        }, 5000); // 5 ثوانٍ دوران مشوق وممتاز
    }
</script>
</body>
</html>
