<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>العجلة الملكية الحقيقية 3D</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #131824 0%, #05070a 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* حاوية العجلة لضبط تراكيب الصور الفخمة فوق بعضها */
        .wheel-wrapper {
            position: relative;
            width: 90vw;
            max-width: 380px;
            height: 90vw;
            max-width: 380px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 2. الإطار الخارجي المظلل والمرتب جداً (ثابت) */
        .wheel-border {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: url('wheel_border.png') no-repeat center center;
            background-size: contain;
            pointer-events: none; /* عشان ما يغطي على كليك زر التدوير إذا كان بالمنتصف */
        }

        /* 1 & 4 & 5. العجلة الحقيقية الملونة وبمنتصفها الماسة (هي التي تدور) */
        .wheel-dynamic {
            width: 86%; /* أصغر قليلاً لتدور داخل الإطار بحجم متناسق */
            height: 86%;
            border-radius: 50%;
            background: url('wheel_bg.png') no-repeat center center;
            background-size: contain;
            transition: transform 6s cubic-bezier(0.2, 0.85, 0.2, 1);
            z-index: 5;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* 3. سهم التثبيت الواقعي الثقيل جداً من الصورة */
        .real-pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 45px;  /* تحكم بالحجم ليطابق إطارك */
            height: 55px;
            background: url('pointer.png') no-repeat center center;
            background-size: contain;
            z-index: 25;
            transform-origin: 50% 0%;
        }

        /* أنيميشن التكتكة الميكانيكية للسهم الحقيقي */
        @keyframes pointer-tick {
            0% { transform: translateX(-50%) rotate(0deg); }
            50% { transform: translateX(-50%) rotate(-15deg); }
            100% { transform: translateX(-50%) rotate(0deg); }
        }

        .real-pointer.tick-active {
            animation: pointer-tick 0.12s ease-in-out;
        }

        /* زر ابدأ التدوير الفخم */
        .btn-spin {
            background: linear-gradient(180deg, #ffee77 0%, #ffcc00 40%, #b8860b 100%);
            color: #05070a;
            border: 1px solid #fff;
            padding: 14px 65px;
            font-size: 1.25rem;
            font-weight: 900;
            border-radius: 35px;
            cursor: pointer;
            box-shadow: 
                0 0 15px rgba(255, 204, 0, 0.35),
                0 6px 20px rgba(0,0,0,0.5);
            transition: all 0.2s ease;
        }

        .btn-spin:active {
            transform: scale(0.96);
        }

        .btn-spin:disabled {
            background: #222631;
            color: #52596b;
            border-color: #333;
            box-shadow: none;
            cursor: not-allowed;
        }

        .info-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 204, 0, 0.15);
            border-radius: 16px;
            padding: 14px;
            text-align: center;
            width: 82%;
            max-width: 320px;
            margin-top: 25px;
            font-size: 0.85rem;
        }
        .gold { color: #ffcc00; font-weight: bold; }
    </style>
</head>
<body>

    <div class="wheel-wrapper">
        <div class="real-pointer" id="pointer"></div>
        <div class="wheel-border"></div>
        <div class="wheel-dynamic" id="wheelDisk"></div>
    </div>

    <button class="btn-spin" id="spinBtn" onclick="startSpinning()">ابدأ التدوير</button>

    <div class="info-box">
        <span class="gold">انتظرونا... الإطلاق الملكي</span><br>
        العجلة الكبرى لـ {سوريا كاش} بأعلى دقة وواقعية 3D.
    </div>

    <audio id="sndTick" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav" preload="auto"></audio>
    <audio id="sndWin" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-84.wav" preload="auto"></audio>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode') || 'cash';

    const wheelDisk = document.getElementById('wheelDisk');
    const pointer = document.getElementById('pointer');
    const sndTick = document.getElementById('sndTick');
    const sndWin = document.getElementById('sndWin');

    // ترتيب الجوائز على صورتك الـ PNG من قمة العجلة ومع اتجاه عقارب الساعة
    let prizes = [];
    if(mode === 'refs') {
        prizes = ["50 ليرة", "50 ليرة", "50 ليرة", "50 ليرة", "50 ليرة", "50 ليرة", "50 ليرة", "50 ليرة"];
    } else {
        prizes = ["50 ليرة", "100 ليرة", "200 ليرة", "350 ليرة", "500 ليرة", "750 ليرة", "1000 ليرة", "1500 ليرة"];
    }
    
    const numSeg = prizes.length;

    function startSpinning() {
        document.getElementById('spinBtn').disabled = true;

        // اختيار الجائزة عشوائياً
        const targetIdx = Math.floor(Math.random() * numSeg);
        const targetPrize = prizes[targetIdx];

        // حساب زاوية الوقوف الدقيقة لتقف السهم على الجائزة المطلوبة بالملي
        const rotations = 7 * 360; // 7 لفات كاملة وسريعة للتشويق
        const finalAngleDeg = rotations + (360 - (targetIdx * (360 / numSeg)) - (180 / numSeg));

        // تدوير الصورة الحقيقية للقرص
        wheelDisk.style.transform = `rotate(${finalAngleDeg}deg)`;

        // تشغيل صوت التكتكة الميكانيكية واهتزاز السهم الواقعي
        let ticksTriggered = 0;
        const totalTicksEstimated = 54; 
        let tickDelay = 50;

        function doTick() {
            if (ticksTriggered < totalTicksEstimated) {
                pointer.classList.remove('tick-active');
                void pointer.offsetWidth; // ريست للأنيميشن
                pointer.classList.add('tick-active');

                sndTick.currentTime = 0;
                sndTick.play().catch(()=>{});
                tg.HapticFeedback.impactOccurred('light');

                ticksTriggered++;
                tickDelay += (ticksTriggered * 4); // إبطاء تدريجي فخم
                setTimeout(doTick, tickDelay);
            }
        }
        
        setTimeout(doTick, 100);

        // انتهاء الدوران، الاحتفال، وإرسال البيانات للبوت
        setTimeout(() => {
            sndWin.play().catch(()=>{});
            tg.HapticFeedback.notificationOccurred('success');

            // المفرقعات الكبرى
            var duration = 2.5 * 1000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0, y: 0.8 } });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1, y: 0.8 } });
                if (Date.now() < end) { requestAnimationFrame(frame); }
            }());

            setTimeout(() => {
                tg.sendData(JSON.stringify({
                    prize: targetPrize,
                    mode: mode,
                    amount: parseInt(targetPrize)
                }));
                tg.close();
            }, 2200);

        }, 6000); // متناسق مع الـ 6 ثواني بالـ CSS
    }
</script>
</body>
</html>
