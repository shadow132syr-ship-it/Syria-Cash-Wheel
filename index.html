<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عجلة الحظ الاحترافية V2</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0f172a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* حاوية المنظور الـ 3D لتميل العجلة مثل الفيديو */
        .perspective-container {
            perspective: 1000px;
            perspective-origin: center 30%;
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .wheel-wrapper {
            position: relative;
            width: 360px;
            height: 360px;
            /* تمييل العجلة على محور X لتبدو مسطحة بزاوية احترافية */
            transform: rotateX(45deg);
            transform-style: preserve-3d;
        }

        /* الإطار الخارجي المعدني المضيء */
        .outer-border {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, #2d3748 60%, #1a202c 100%);
            border: 12px solid #111827;
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.7),
                0 0 30px rgba(226, 160, 78, 0.4),
                inset 0 0 20px rgba(0, 0, 0, 0.8);
            box-sizing: border-box;
        }

        /* العجلة الدوارة الفخمة */
        .wheel-plate {
            position: absolute;
            top: 6px;
            left: 6px;
            width: calc(100% - 12px);
            height: calc(100% - 12px);
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                #2563eb 0deg 45deg,   #3b82f6 45deg 90deg,
                #16a34a 90deg 135deg,  #22c55e 135deg 180deg,
                #dc2626 180deg 225deg, #ef4444 225deg 270deg,
                #ca8a04 270deg 315deg, #eab308 315deg 360deg
            );
            border: 4px solid #4b5563;
            box-sizing: border-box;
            transition: transform 5s cubic-bezier(0.2, 0.8, 0.1, 1);
            overflow: hidden;
        }

        /* النقاط أو المسامير المضيئة حول الإطار */
        .led-light {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 8px #fff, 0 0 15px #eab308;
        }

        /* السنتر الذهبي في منتصف العجلة */
        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) translateZ(10px);
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, #fef08a 0%, #ca8a04 100%);
