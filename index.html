<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Syria Cash Wheel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #0f172a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden;
        }

        .wheel-container {
            position: relative;
            width: 340px;
            height: 340px;
            border: 10px solid #1e293b;
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(0,0,0,0.6), inset 0 0 20px rgba(255,255,255,0.1);
        }

        /* المؤشر الواقعي */
        .pin {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 18px solid transparent;
            border-right: 18px solid transparent;
            border-top: 35px solid #ef4444;
            z-index: 100;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
        }

        canvas {
            border-radius: 50%;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .spin-btn {
            margin-top: 40px;
            padding: 16px 50px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
            transition: all 0.2s;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .spin-btn:active {
            transform: scale(0.92);
        }

        .result-text {
            margin-top: 25px;
            font-size: 1.5rem;
            font-weight: bold;
            height: 40px;
            color: #f1c40f;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="wheel-container">
        <div class="pin"></div>
        <canvas id="wheel" width="340" height="340"></canvas>
    </div>

    <div class="result-text" id="result"></div>
    <button class="spin-btn" id="spinBtn">تدوير العجلة</button>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const resultDiv = document.getElementById('result');
        const spinBtn = document.getElementById('spinBtn');
        const tg = window.Telegram.WebApp;

        tg.expand();

        // قائمة الجوائز كما طلبت بضبط
        const prizes = [
            { text: "50 ليرة", val: 50, color: "#3b82f6" },
            { text: "10 ليرات", val: 10, color: "#10b981" },
            { text: "5 ليرات", val: 5, color: "#8b5cf6" },
            { text: "الحظ الأوفر", val: 0, color: "#f59e0b" },
            { text: "15 ليرة", val: 15, color: "#3b82f6" },
            { text: "20 ليرة", val: 20, color: "#10b981" },
            { text: "25 ليرة", val: 25, color: "#8b5cf6" },
            { text: "30 ليرة", val: 30, color: "#f59e0b" },
            { text: "قسيمة 25$", val: 1000, color: "#ec4899" },
            { text: "قسيمة 50$", val: 2000, color: "#ef4444" },
            { text: "125 ليرة", val: 125, color: "#06b6d4" }
        ];

        const numPrizes = prizes.length;
        const arcSize = (2 * Math.PI) / numPrizes;
        let currentRotation = 0;

        function drawWheel() {
            prizes.forEach((prize, i) => {
                const angle = i * arcSize;
                ctx.beginPath();
                ctx.fillStyle = prize.color;
                ctx.moveTo(170, 170);
                ctx.arc(170, 170, 170, angle, angle + arcSize);
                ctx.fill();
                ctx.stroke();

                ctx.save();
                ctx.translate(170, 170);
                ctx.rotate(angle + arcSize / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "white";
                ctx.font = "bold 16px Arial";
                ctx.fillText(prize.text, 160, 10);
                ctx.restore();
            });
        }

        drawWheel();

        spinBtn.addEventListener('click', () => {
            spinBtn.disabled = true;
            const extraSpins = 5 + Math.random() * 5; 
            const stopAngle = Math.random() * (2 * Math.PI);
            currentRotation += (extraSpins * 2 * Math.PI) + stopAngle;

            canvas.style.transform = `rotate(${currentRotation}rad)`;

            setTimeout(() => {
                const totalRotation = currentRotation % (2 * Math.PI);
                const winningIndex = Math.floor((numPrizes - (totalRotation / arcSize)) % numPrizes);
                const winner = prizes[winningIndex];

                resultDiv.innerText = winner.val === 0 ? "حظ أوفر المرة القادمة!" : `ربحت ${winner.text} 🎊`;

                // إرسال البيانات للبوت
                setTimeout(() => {
                    if (tg.sendData) {
                        tg.sendData(winner.val.toString());
                    }
                }, 2000);

            }, 5000);
        });
    </script>
</body>
</html>
