<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3x3 Slot Game Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #0d0d0d;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            direction: rtl;
            user-select: none;
            -webkit-user-select: none;
        }
        .balance-container {
            background: linear-gradient(135deg, #e67e22, #d35400);
            padding: 10px 20px;
            border-radius: 20px;
            display: inline-block;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(230, 126, 34, 0.3);
        }
        h1 { 
            font-size: 22px; 
            margin-bottom: 25px; 
            color: #f39c12;
            text-shadow: 0 0 10px rgba(243, 156, 18, 0.3);
        }
        .slot-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            max-width: 340px;
            margin: 0 auto;
            background: #161616;
            padding: 15px;
            border-radius: 16px;
            border: 2px solid #2a2a2a;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .reel-box {
            background: #1e1e1e;
            border: 2px solid #333;
            border-radius: 12px;
            width: 90px;
            height: 270px;
            overflow: hidden;
            position: relative;
        }
        .reel-box::before, .reel-box::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            height: 30px;
            z-index: 2;
            pointer-events: none;
        }
        .reel-box::before { top: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent); }
        .reel-box::after { bottom: 0; background: linear-gradient(to top, rgba(0,0,0,0.7), transparent); }
        .reel {
            display: flex;
            flex-direction: column;
            position: absolute;
            width: 100%;
            top: 0;
            left: 0;
        }
        .symbol {
            height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 42px;
            box-sizing: border-box;
        }
        .btn-spin {
            background: linear-gradient(180deg, #27ae60, #2ecc71);
            color: white;
            border: none;
            padding: 14px 0;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 30px;
            width: 90%;
            max-width: 340px;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
            transition: all 0.15s ease;
        }
        .btn-spin:active { transform: scale(0.98); }
        .btn-spin:disabled { 
            background: #222 !important; 
            color: #555;
            box-shadow: none;
            cursor: not-allowed;
        }
        .result {
            margin-top: 25px;
            font-size: 20px;
            color: #ff4444;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

    <div class="balance-container">
        رصيدك: <span id="user-balance">0</span> ليرة
    </div>

    <h1>Slot Game 3×3</h1>

    <div class="slot-container">
        <div class="reel-box"><div class="reel" id="reel1"></div></div>
        <div class="reel-box"><div class="reel" id="reel2"></div></div>
        <div class="reel-box"><div class="reel" id="reel3"></div></div>
    </div>

    <div class="result" id="result-text">❌ خسرت حظاً أوفر (خصم 300 ليرة)</div>

    <button class="btn-spin" id="spin-btn" onclick="startSpinPro()">🎰 تدوير (300 ليرة)</button>

    <script>
        // تهيئة وتوسيع واجهة التليجرام WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // جلب الرصيد الممرر من البوت عبر رابط المعلمات
        const urlParams = new URLSearchParams(window.location.search);
        let currentBalance = parseFloat(urlParams.get('balance')) || 0;
        document.getElementById('user-balance').innerText = currentBalance;

        // مصفوفة الرموز والنتيجة المحددة سلفاً (الخسارة)
        const pool = ["🍉", "🍓", "🍒", "7️⃣", "⭐", "🍇", "🍋"];
        const finalLoseLayout = [
            ["🍉", "7️⃣", "🍒"], 
            ["🍓", "⭐", "🍉"], 
            ["🍒", "🍉", "🍓"]  
        ];

        // تهيئة بكرات اللعبة بشكل عشوائي مبدئي
        function initReels() {
            for (let i = 1; i <= 3; i++) {
                const reel = document.getElementById(`reel${i}`);
                let html = '';
                for (let j = 0; j < 30; j++) {
                    const symbol = pool[Math.floor(Math.random() * pool.length)];
                    html += `<div class="symbol">${symbol}</div>`;
                }
                reel.innerHTML = html;
            }
        }
        initReels();

        // دالة بدء التدوير ومعالجة الخصم الفوري والإرسال
        function startSpinPro() {
            const btn = document.getElementById('spin-btn');
            const result = document.getElementById('result-text');

            // حماية: التأكد من وجود رصيد كافٍ بالواجهة قبل بدء اللعب
            if (currentBalance < 300) {
                alert("رصيدك غير كافٍ! تحتاج إلى 300 ليرة على الأقل للعب.");
                return;
            }

            btn.disabled = true;
            result.style.display = "none";

            // خصم 300 ليرة فورياً من الواجهة أمام المستخدم
            currentBalance -= 300;
            document.getElementById('user-balance').innerText = currentBalance;

            // تشغيل حركة البكرات بتوقيتات متفاوتة لإعطاء حماس أكبر
            spinReel(1, finalLoseLayout[0], 2000);
            spinReel(2, finalLoseLayout[1], 2500);
            spinReel(3, finalLoseLayout[2], 3000);

            // عند انتهاء حركة البكرة الأخيرة (بعد 3.1 ثانية)
            setTimeout(() => {
                result.style.display = "block";
                
                // انتظار ثانية ونصف ليشاهد النتيجة ثم إرسال البيانات للبوت وإغلاق الواجهة
                setTimeout(() => {
                    const dataToSend = JSON.stringify({ action: "lose_slot_zero" });
                    tg.sendData(dataToSend);
                }, 1500);
            }, 3100);
        }

        // دالة تحريك البكرة الفردية وتثبيتها على الرموز المطلوبة
        function spinReel(reelNum, finalThree, duration) {
            const reel = document.getElementById(`reel${reelNum}`);
            reel.style.transition = 'none';
            reel.style.top = '0px';
            
            const symbols = reel.children;
            symbols[27].innerText = finalThree[0]; 
            symbols[28].innerText = finalThree[1]; 
            symbols[29].innerText = finalThree[2]; 

            setTimeout(() => {
                reel.style.transition = `top ${duration}ms cubic-bezier(0.1, 0.9, 0.2, 1)`;
                reel.style.top = '-2430px'; 
            }, 20);
        }
    </script>
</body>
</html>
