<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عجلة الحظ</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(180deg, #101c2c 0%, #080e18 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .wheel-container {
            position: relative;
            width: 320px;
            height: 320px;
            margin-bottom: 40px;
            perspective: 1000px; /* تأثير الـ 3D الخفيف */
        }

        /* الإطار المضيء الخارجي */
        .wheel-outer-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 20px #e2a04e, inset 0 0 15px #e2a04e;
            border: 8px solid #c98a35;
            background: #1a2636;
            box-sizing: border-box;
        }

        /* العجلة الدوارة الفعلية */
        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.1, 1); /* حركة دوران ناعمة تبطئ بالنهاية */
            background: conic-gradient(
                #ff4b4b 0deg 45deg, #ff9233 45deg 90deg, 
                #ffcd38 90deg 135deg, #4ce27a 135deg 180deg,
                #38cdff 180deg 225deg, #3d6aff 225deg 270deg,
                #9b3dff 270deg 315deg, #ff3db8 315deg 360deg
            );
        }

        /* المؤشر السهم في الأعلى */
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #ffffff;
            filter: drop-shadow(0px 4px 5px rgba(0,0,0,0.5));
            z-index: 10;
        }

        /* الزر السفلي للتدمير */
        .spin-btn {
            background: linear-gradient(180deg, #ffd043 0%, #ff9e00 100%);
            border: none;
            padding: 15px 50px;
            color: #101c2c;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 158, 0, 0.4);
            transition: all 0.2s;
        }

        .spin-btn:active {
            transform: scale(0.95);
        }

        .spin-btn:disabled {
            background: #4a5568;
            color: #a0aec0;
            box-shadow: none;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="wheel-container">
        <div class="pointer"></div>
        <div class="wheel-outer-ring">
            <canvas id="wheel" width="320" height="320"></canvas>
        </div>
    </div>

    <button class="spin-btn" id="spinBtn" onclick="startSpin()">لديك تدويرة مجانية</button>

    <script>
        // إعدادات تليجرام
        const tg = window.Telegram.WebApp;
        tg.expand(); // فتح الشاشة بالكامل

        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');

        // قائمة الجوائز الخاصة بك
        const prizes = [
            "500 ليرة", "زيادة 10%", "20,000 ليرة", "حساب ممتاز",
            "100 ليرة", "تذكرة سحب", "مفاجأة نقدية", "حظ أوفر"
        ];
        
        const numSegments = prizes.length;
        const segmentAngle = 360 / numSegments;
        let currentRotation = 0;
        let isSpinning = false;

        // رسم محتويات العجلة (الأسماء والخطوط الفاصلة)
        function drawWheel() {
            const radius = canvas.width / 2;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < numSegments; i++) {
                const angle = (i * segmentAngle) * Math.PI / 180;
                ctx.save();
                ctx.translate(radius, radius);
                ctx.rotate(angle + (segmentAngle / 2) * Math.PI / 180);
                
                // كتابة النص داخل القسم
                ctx.textAlign = "right";
                ctx.textColor = "#ffffff";
                ctx.font = "bold 14px sans-serif";
                ctx.fillStyle = "#ffffff";
                ctx.fillText(prizes[i], radius - 30, 5);
                ctx.restore();
            }
        }

        drawWheel();

        function startSpin() {
            if (isSpinning) return;
            isSpinning = true;
            spinBtn.disabled = true;

            // تحديد جائزة عشوائية من الـ Backend أو حسابها هنا
            const prizeIndex = Math.floor(Math.random() * numSegments);
            
            // حساب زاوية الدوران (مثلاً 5 دورات كاملة + زاوية الجائزة المستهدفة)
            const targetAngle = (numSegments - prizeIndex) * segmentAngle - (segmentAngle / 2);
            const totalDegrees = 1800 + targetAngle; // 1800 تعني 5 دورات كاملة لمنح تأثير السرعة المبطئة

            canvas.style.transform = `rotate(${totalDegrees}deg)`;

            // عند انتهاء حركة الدوران (بعد 4 ثوانٍ حسب الـ CSS)
            setTimeout(() => {
                // تفعيل تأثير المفرقعات الاحتفالية كالفيديو تماماً
                confetti({
                    particleCount: 150,
                    spread: 80,
                    origin: { y: 0.6 }
                });

                // إرسال النتيجة إلى البوت عبر التليجرام وإغلاق النافذة
                setTimeout(() => {
                    tg.sendData(JSON.stringify({
                        prize: prizes[prizeIndex],
                        index: prizeIndex
                    }));
                    tg.close();
                }, 2000); // الانتظار ثانيتين لرؤية الاحتفال ثم الإغلاق
                
            }, 4000);
        }
    </script>
</body>
</html>
