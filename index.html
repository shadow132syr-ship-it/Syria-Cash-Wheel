<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عجلة سوريا كاش</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0f172a; 
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .perspective-container {
            perspective: 1000px;
            perspective-origin: center 35%;
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
        }

        .wheel-wrapper {
            position: relative;
            width: 320px;
            height: 320px;
            transform: rotateX(40deg); 
            transform-style: preserve-3d;
        }

        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%) translateZ(30px);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #ef4444; 
            filter: drop-shadow(0px 5px 5px rgba(0,0,0,0.5));
            z-index: 99;
        }

        .outer-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 10px solid #1e293b;
            box-shadow: 0 0 25px rgba(234, 179, 8, 0.5), inset 0 0 20px rgba(0,0,0,0.8);
            background: #0f172a;
            box-sizing: border-box;
            z-index: 1;
        }

        .wheel-plate {
            position: absolute;
            top: 8px;
            left: 8px;
            width: calc(100% - 16px);
            height: calc(100% - 16px);
            border-radius: 50%;
            /* تم استبدال الرابط برابط لعجلة مصممة وجاهزة من على الإنترنت */
            background: url('https://i.imgur.com/vDxF667.png') center center / cover no-repeat; 
            transition: transform 5s cubic-bezier(0.15, 0.85, 0.1, 1);
            z-index: 2;
        }

        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) translateZ(10px);
            width: 45px;
            height: 45px;
            background: radial-gradient(circle, #fef08a 0%, #ca8a04 100%);
            border-radius: 50%;
            border: 3px solid #facc15;
            box-shadow: 0 4px 8px rgba(0,0,0,0.6);
            z-index: 10;
        }

        .spin-btn {
            background: linear-gradient(180deg, #ffd043 0%, #ff9e00 100%);
            border: none;
            padding: 15px 60px;
            color: #0f172a;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(255, 158, 0, 0.4);
            transition: all 0.2s ease;
        }

        .spin-btn:disabled {
            background: #334155;
            color: #64748b;
            box-shadow: none;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="perspective-container">
        <div class="wheel-wrapper">
            <div class="pointer"></div>
            <div class="outer-ring"></div>
            <div class="wheel-plate" id="wheelPlate"></div>
            <div class="wheel-center"></div>
        </div>
    </div>

    <button class="spin-btn" id="spinBtn" onclick="startSpin()">لديك تدويرة مجانية</button>

    <script>
        const tg = window.Telegram.WebApp;
        if (tg) tg.expand();

        // ترتيب الجوائز حسب اتجاه عقارب الساعة في صورتك الجديدة
        const prizes = [
            "حظ أوفر", "500 ليرة", "زيادة 10%", "20,000 ليرة",
            "حساب ممتاز", "100 ليرة", "تذكرة سحب", "مفاجأة نقدية"
        ];
        
        let isSpinning = false;

        function startSpin() {
            if (isSpinning) return;
            isSpinning = true;
            
            const spinBtn = document.getElementById('spinBtn');
            const wheelPlate = document.getElementById('wheelPlate');
            spinBtn.disabled = true;

            const targetIndex = Math.floor(Math.random() * prizes.length);
            
            const degreesPerSegment = 45;
            const targetAngle = (prizes.length - targetIndex) * degreesPerSegment - 22.5;
            const totalRotation = 2160 + targetAngle; 

            wheelPlate.style.transform = `rotate(${totalRotation}deg)`;

            setTimeout(() => {
                confetti({
                    particleCount: 150,
                    spread: 80,
                    origin: { y: 0.6 }
                });

                setTimeout(() => {
                    if (tg && tg.sendData) {
                        tg.sendData(JSON.stringify({
                            prize: prizes[targetIndex],
                            index: targetIndex
                        }));
                    }
                    if (tg) tg.close();
                }, 2000);

            }, 5000);
        }
    </script>
</body>
</html>
