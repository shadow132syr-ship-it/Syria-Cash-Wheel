<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syria Cash Wheel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .wheel-container { position: relative; width: 320px; height: 320px; border: 5px solid #1e293b; border-radius: 50%; }
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid #ef4444; z-index: 10; }
        canvas { border-radius: 50%; transition: transform 6s cubic-bezier(0.15, 0, 0.15, 1); }
        .btn { margin-top: 30px; padding: 12px 40px; background: #6366f1; border: none; border-radius: 25px; color: white; font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="wheel-container">
        <div class="pointer"></div>
        <canvas id="wheel" width="320" height="320"></canvas>
    </div>
    <div id="status" style="margin-top: 20px; color: #f1c40f;"></div>
    <button class="btn" id="spinBtn">تدوير العجلة</button>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const tg = window.Telegram.WebApp;
        const prizes = [
            {t:"50 ليرة", v:50, c:"#3498db"}, {t:"10 ليرات", v:10, c:"#2ecc71"},
            {t:"5 ليرات", v:5, c:"#9b59b6"}, {t:"حظ أوفر", v:0, c:"#e67e22"},
            {t:"15 ليرة", v:15, c:"#34495e"}, {t:"20 ليرة", v:20, c:"#16a085"},
            {t:"25 ليرة", v:25, c:"#2980b9"}, {t:"30 ليرة", v:30, c:"#8e44ad"},
            {t:"قسيمة 25$", v:1000, c:"#d35400"}, {t:"قسيمة 50$", v:2000, c:"#c0392b"},
            {t:"125 ليرة", v:125, c:"#27ae60"}
        ];
        const arc = (2 * Math.PI) / prizes.length;
        let rotation = 0;

        function draw() {
            prizes.forEach((p, i) => {
                ctx.beginPath(); ctx.fillStyle = p.c; ctx.moveTo(160, 160);
                ctx.arc(160, 160, 160, i*arc, (i+1)*arc); ctx.fill();
                ctx.save(); ctx.translate(160, 160); ctx.rotate(i*arc + arc/2);
                ctx.textAlign = "right"; ctx.font = "bold 14px Arial";
                ctx.strokeStyle = "black"; ctx.lineWidth = 3; ctx.strokeText(p.t, 150, 5);
                ctx.fillStyle = "white"; ctx.fillText(p.t, 150, 5); ctx.restore();
            });
        }
        draw();

        document.getElementById('spinBtn').onclick = function() {
            this.disabled = true;
            const chance = Math.random() * 100;
            const target = (chance <= 90) ? 2 : Math.floor(Math.random() * prizes.length);
            const extraSpins = 10 * 2 * Math.PI;
            const stopAngle = (prizes.length - target - 0.5) * arc;
            rotation += extraSpins + stopAngle;
            canvas.style.transform = `rotate(${rotation}rad)`;

            setTimeout(() => {
                document.getElementById('status').innerText = "مبروك! ربحت " + prizes[target].t;
                setTimeout(() => { tg.sendData(prizes[target].v.toString()); tg.close(); }, 2000);
            }, 6000);
        };
    </script>
</body>
</html>
