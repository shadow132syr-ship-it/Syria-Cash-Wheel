<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Syria Cash PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --gold: #f1c40f;
            --accent: #ef4444;
        }

        body {
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow: hidden;
        }

        /* حاوية العجلة الاحترافية */
        .wheel-box {
            position: relative;
            width: 350px;
            height: 350px;
            border: 10px solid #1e293b;
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(0,0,0,0.7);
        }

        .pin {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid var(--accent);
            z-index: 100;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5));
        }

        canvas {
            border-radius: 50%;
            transition: transform 6s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .controls {
            margin-top: 40px;
            text-align: center;
        }

        #result {
            font-size: 1.5rem;
            color: var(--gold);
            font-weight: bold;
            margin-bottom: 20px;
            height: 30px;
        }

        .spin-btn {
            padding: 15px 60px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4);
        }

        .spin-btn:disabled { background: #475569; }
    </style>
</head>
<body>

    <div class="wheel-box">
        <div class="pin"></div>
        <canvas id="wheel" width="350" height="350"></canvas>
    </div>

    <div class="controls">
        <div id="result">اختبر حظك اليوم!</div>
        <button class="spin-btn" id="spinBtn">تدوير العجلة</button>
    </div>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const resultDiv = document.getElementById('result');
        const tg = window.Telegram.WebApp;

        tg.expand();

        // الجوائز بدقة عالية
        const prizes = [
            { text: "50 ليرة", val: 50, color: "#3498db" },
            { text: "10 ليرات", val: 10, color: "#2ecc71" },
            { text: "5 ليرات", val: 5, color: "#9b59b6" }, // هذا هو الهدف (Index 2)
            { text: "الحظ الأوفر", val: 0, color: "#e67e22" },
            { text: "15 ليرة", val: 15, color: "#34495e" },
            { text: "20 ليرة", val: 20, color: "#16a085" },
            { text: "25 ليرة", val: 25, color: "#2980b9" },
            { text: "30 ليرة", val: 30, color: "#8e44ad" },
            { text: "قسيمة 25$", val: 1000, color: "#d35400" },
            { text: "قسيمة 50$", val: 2000, color: "#c0392b" },
            { text: "125 ليرة", val: 125, color: "#27ae60" }
        ];

        const numPrizes = prizes.length;
        const arcSize = (2 * Math.PI) / numPrizes;
        let currentRotation = 0;

        function draw() {
            prizes.forEach((p, i) => {
                const angle = i * arcSize;
                ctx.beginPath();
                ctx.fillStyle = p.color;
                ctx.moveTo(175, 175);
                ctx.arc(175, 175, 175, angle, angle + arcSize);
                ctx.fill();
                ctx.save();
                ctx.translate(175, 175);
                ctx.rotate(angle + arcSize / 2);
                ctx.fillStyle = "white";
                ctx.font = "bold 14px Arial";
                ctx.fillText(p.text, 165 - ctx.measureText(p.text).width, 5);
                ctx.restore();
            });
        }
        draw();

        spinBtn.addEventListener('click', () => {
            spinBtn.disabled = true;
            resultDiv.innerText = "جاري التدوير...";

            // خوارزمية الحظ 90% للـ 5 ليرات
            const chance = Math.random() * 100;
            let targetIndex;
            if (chance <= 90) {
                targetIndex = 2; // إجبار التوقف على "5 ليرات"
            } else {
                targetIndex = Math.floor(Math.random() * numPrizes); // 10% حظ عشوائي
            }

            const spins = 10 * 2 * Math.PI;
            const stopAngle = (numPrizes - targetIndex - 0.5) * arcSize;
            const totalMove = spins + stopAngle;
            
            currentRotation += totalMove;
            canvas.style.transform = `rotate(${currentRotation}rad)`;

            setTimeout(() => {
                const winner = prizes[targetIndex];
                resultDiv.innerText = winner.val === 0 ? "حظ أوفر!" : `مبروك! ربحت ${winner.text}`;

                // إرسال البيانات وإغلاق النافذة
                setTimeout(() => {
                    tg.sendData(winner.val.toString());
                    tg.close();
                }, 2000);
            }, 6000);
        });
    </script>
</body>
</html>
