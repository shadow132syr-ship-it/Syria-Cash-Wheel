<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syria Cash - Throne Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            background: radial-gradient(circle, #1a2a6c, #000000); /* خلفية كونية */
            color: white; font-family: 'Arial', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            height: 100vh; margin: 0; justify-content: center;
        }
        
        .wheel-outer {
            position: relative; width: 340px; height: 340px;
            border: 8px solid #2c3e50; border-radius: 50%;
            box-shadow: 0 0 40px rgba(0,0,0,0.8), 0 0 20px rgba(108, 92, 231, 0.3);
            background: #000;
        }

        .wheel-inner {
            width: 100%; height: 100%; border-radius: 50%;
            overflow: hidden; transition: transform 6s cubic-bezier(0.1, 0, 0.1, 1);
        }

        canvas { width: 100%; height: 100%; transform: rotate(-90deg); }

        .center-node {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 55px; height: 55px; 
            background: radial-gradient(#ff4b2b, #8e0000); /* زر أحمر متوهج مثل الصورة */
            border-radius: 50%; border: 3px solid #111; z-index: 5;
            box-shadow: 0 0 20px rgba(255, 75, 43, 0.6);
        }

        .pointer {
            position: absolute; top: -12px; left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0; 
            border-left: 15px solid transparent; border-right: 15px solid transparent; 
            border-top: 30px solid #ecf0f1; /* مؤشر فضي */
            z-index: 10; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));
        }

        .info-button {
            margin-top: 50px; background: #000;
            padding: 12px 35px; border-radius: 25px;
            border: 2px solid #333; font-size: 18px; font-weight: bold;
            color: #fff; box-shadow: 0 0 15px rgba(0,0,0,0.5);
            cursor: pointer;
        }

        .result-msg {
            margin-top: 20px; font-size: 19px; color: #f1c40f; 
            font-weight: bold; min-height: 25px; text-shadow: 0 0 10px rgba(241, 196, 15, 0.5);
        }
    </style>
</head>
<body>

    <div class="wheel-outer">
        <div class="pointer"></div>
        <div class="center-node"></div>
        <div class="wheel-inner" id="wheel-container">
            <canvas id="canvas" width="400" height="400"></canvas>
        </div>
    </div>

    <div class="result-msg" id="resultLabel"></div>
    <button class="info-button" id="spinBtn">لفّ العجلة الآن 🎰</button>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    // المبالغ من العجلة السابقة (ليرة كاش)
    const prizes = ["100 ليرة", "20 ليرة", "1 ليرة", "حظ أوفر", "50 ليرة", "10 ليرات", "5 ليرات", "7 ليرات", "12 ليرة"];
    // ألوان فخمة متناسقة مع ستايل "ثرون"
    const colors = ["#d35400", "#f39c12", "#27ae60", "#7f8c8d", "#8e44ad", "#f1c40f", "#2980b9", "#16a085", "#3498db"];
    
    const numPrizes = prizes.length;
    const arc = 2 * Math.PI / numPrizes;

    function drawWheel() {
        prizes.forEach((prize, i) => {
            const angle = i * arc;
            ctx.fillStyle = colors[i];
            ctx.beginPath();
            ctx.moveTo(200, 200);
            ctx.arc(200, 200, 195, angle, angle + arc);
            ctx.fill();
            
            // إضافة لمعة خفيفة للأقسام
            ctx.strokeStyle = "rgba(255,255,255,0.1)";
            ctx.lineWidth = 3;
            ctx.stroke();

            // رسم النص
            ctx.save();
            ctx.translate(200, 200);
            ctx.rotate(angle + arc / 2);
            ctx.textAlign = "right";
            ctx.fillStyle = "white";
            ctx.font = "bold 17px sans-serif";
            ctx.fillText(prize, 180, 8);
            ctx.restore();
        });
    }

    drawWheel();

    let rotation = 0;
    const wheelContainer = document.getElementById('wheel-container');
    const spinBtn = document.getElementById('spinBtn');
    const resultLabel = document.getElementById('resultLabel');

    spinBtn.onclick = () => {
        spinBtn.disabled = true;
        resultLabel.innerText = "⏳ جاري البحث عن جائزتك...";
        
        const extraDegree = Math.floor(Math.random() * 360) + 3600; 
        rotation += extraDegree;
        
        wheelContainer.style.transform = `rotate(${rotation}deg)`;
        
        setTimeout(() => {
            spinBtn.disabled = false;
            const actualDeg = rotation % 360;
            const prizeIndex = Math.floor((360 - actualDeg) / (360 / numPrizes)) % numPrizes;
            
            const finalPrize = prizes[prizeIndex];
            resultLabel.innerText = finalPrize === "حظ أوفر" ? "😢 حظ أوفر للمرة القادمة" : `🎊 مبروك! ربحت ${finalPrize}`;
        }, 6000);
    };

    // إعدادات Telegram WebApp
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();
</script>
</body>
</html>
