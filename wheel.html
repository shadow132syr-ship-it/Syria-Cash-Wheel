<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سوريا كاش - V3 ثابتة</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            background: #05070a; color: white; font-family: sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; height: 100vh; margin: 0; overflow: hidden;
        }
        /* الحاوية الأساسية لضمان التمركز المطلق */
        .wrapper {
            position: relative; width: 300px; height: 300px;
            display: flex; align-items: center; justify-content: center;
        }
        canvas { 
            width: 100%; height: 100%; border-radius: 50%;
            border: 8px solid #111; z-index: 1;
            transition: transform 7s cubic-bezier(0.1, 0, 0.1, 1);
        }
        /* المؤشر العلوي */
        .pointer {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 15px solid transparent; 
            border-right: 15px solid transparent; border-top: 25px solid #00d2ff; 
            z-index: 10; filter: drop-shadow(0 0 5px #00d2ff);
        }
        /* المركز الثابت - البرغي */
        .center-nut {
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            width: 45px; height: 45px; 
            background: radial-gradient(circle, #333 0%, #000 100%);
            border: 3px solid #1a1a1a; border-radius: 50%; z-index: 5;
            box-shadow: 0 0 15px rgba(0,0,0,1);
        }
        .btn {
            margin-top: 50px; padding: 15px 60px; font-size: 18px; font-weight: bold;
            background: #111; color: #fff; border: 1px solid #00d2ff;
            border-radius: 50px; cursor: pointer; box-shadow: 0 0 10px rgba(0,210,255,0.2);
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="pointer"></div>
        <div class="center-nut"></div>
        <canvas id="wheel" width="500" height="500"></canvas>
    </div>

    <button id="spin-button" class="btn">لفّ العجلة الملكية 👑</button>

<script>
    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const btn = document.getElementById('spin-button');

    const segments = [
        { label: "100 ليرة", color: "#b91c1c" },
        { label: "20 ليرة", color: "#ea580c" },
        { label: "1 ليرة", color: "#16a34a" },
        { label: "حظ أوفر", color: "#475569" },
        { label: "50 ليرة", color: "#9333ea" },
        { label: "10 ليرات", color: "#ca8a04" },
        { label: "5 ليرات", color: "#0284c7" },
        { label: "7 ليرات", color: "#7c3aed" },
        { label: "12 ليرة", color: "#2563eb" }
    ];

    function drawWheel() {
        const segAngle = (2 * Math.PI) / segments.length;
        for (let i = 0; i < segments.length; i++) {
            const angle = i * segAngle;
            ctx.beginPath(); ctx.fillStyle = segments[i].color; ctx.moveTo(250, 250);
            ctx.arc(250, 250, 250, angle, angle + segAngle); ctx.fill();
            ctx.strokeStyle = "#111"; ctx.lineWidth = 2; ctx.stroke();
            
            ctx.save(); ctx.translate(250, 250); ctx.rotate(angle + segAngle / 2);
            ctx.textAlign = "right"; ctx.fillStyle = "white"; ctx.font = "bold 22px Arial";
            ctx.fillText(segments[i].label, 230, 10); ctx.restore();
        }
    }

    // تأكيد الرسم فور التحميل وبعد ثانية لضمان الظهور
    window.onload = () => {
        drawWheel();
        setTimeout(drawWheel, 500); 
    };

    let rotation = 0;
    btn.onclick = () => {
        btn.disabled = true;
        const luck = Math.random() * 100;
        let targetIdx = luck <= 80 ? 6 : 3; // 80% لـ 5 ليرات

        const segDeg = 360 / segments.length;
        const stopAt = (360 - (targetIdx * segDeg) - (segDeg / 2) + 270) % 360;
        
        rotation += 3600 + stopAt - (rotation % 360);
        canvas.style.transform = `rotate(${rotation}deg)`;

        setTimeout(() => {
            alert(targetIdx === 6 ? "مبروك! ربحت 5 ليرات" : "حظ أوفر!");
            btn.disabled = false;
        }, 7500);
    };
</script>
</body>
</html>
