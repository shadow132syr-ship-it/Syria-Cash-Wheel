<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سوريا كاش - العجلة الملكية</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            background: #05070a; color: white; font-family: 'Segoe UI', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; height: 100vh; margin: 0; overflow: hidden;
        }

        .wrapper {
            position: relative; width: 320px; height: 320px;
            display: flex; align-items: center; justify-content: center;
        }

        canvas { 
            width: 100%; height: 100%; border-radius: 50%;
            border: 8px solid #111; z-index: 1;
            transition: transform 7s cubic-bezier(0.1, 0, 0.1, 1);
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        .pointer {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 15px solid transparent; 
            border-right: 15px solid transparent; border-top: 25px solid #00d2ff; 
            z-index: 10; filter: drop-shadow(0 0 5px #00d2ff);
        }

        .center-nut {
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            width: 50px; height: 50px; 
            background: radial-gradient(circle, #ff3b3b 0%, #8b0000 100%);
            border: 4px solid #1a1a1a; border-radius: 50%; z-index: 5;
            box-shadow: 0 0 15px rgba(0,0,0,1);
        }

        .btn {
            margin-top: 40px; padding: 16px 70px; font-size: 20px; font-weight: bold;
            background: #111; color: #fff; border: 1px solid #00d2ff;
            border-radius: 50px; cursor: pointer; transition: 0.3s;
            box-shadow: 0 0 15px rgba(0,210,255,0.2);
        }

        #timer {
            margin-top: 20px; font-size: 18px; color: #ff3b3b;
            font-weight: bold; display: none;
        }

        .btn:disabled { opacity: 0.5; cursor: not-allowed; border-color: #333; }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="pointer"></div>
        <div class="center-nut"></div>
        <canvas id="wheel" width="500" height="500"></canvas>
    </div>

    <button id="spin-button" class="btn">لفّ العجلة الملكية 👑</button>
    <div id="timer"></div>

<script>
    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const btn = document.getElementById('spin-button');
    const timerDisplay = document.getElementById('timer');
    const tg = window.Telegram.WebApp;

    const segments = [
        { label: "100 ليرة", color: "#b91c1c", value: 100 },
        { label: "20 ليرة", color: "#ea580c", value: 20 },
        { label: "1 ليرة", color: "#16a34a", value: 1 },
        { label: "حظ أوفر", color: "#475569", value: 0 },
        { label: "50 ليرة", color: "#9333ea", value: 50 },
        { label: "10 ليرات", color: "#ca8a04", value: 10 },
        { label: "5 ليرات", color: "#0284c7", value: 5 },
        { label: "7 ليرات", color: "#7c3aed", value: 7 },
        { label: "12 ليرة", color: "#2563eb", value: 12 }
    ];

    function drawWheel() {
        const segAngle = (2 * Math.PI) / segments.length;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < segments.length; i++) {
            const angle = i * segAngle;
            ctx.beginPath(); ctx.fillStyle = segments[i].color; ctx.moveTo(250, 250);
            ctx.arc(250, 250, 250, angle, angle + segAngle); ctx.fill();
            ctx.strokeStyle = "rgba(0,0,0,0.2)"; ctx.lineWidth = 2; ctx.stroke();
            ctx.save(); ctx.translate(250, 250); ctx.rotate(angle + segAngle / 2);
            ctx.textAlign = "right"; ctx.fillStyle = "white"; ctx.font = "bold 24px Arial";
            ctx.fillText(segments[i].label, 235, 10); ctx.restore();
        }
    }

    // نظام فحص الـ 24 ساعة
    function updateTimer() {
        const lastSpin = localStorage.getItem('last_spin_sy');
        if (lastSpin) {
            const now = Date.now();
            const diff = now - parseInt(lastSpin);
            const cooldown = 24 * 60 * 60 * 1000; 

            if (diff < cooldown) {
                btn.disabled = true;
                timerDisplay.style.display = 'block';
                const rem = cooldown - diff;
                const h = Math.floor(rem / 3600000);
                const m = Math.floor((rem % 3600000) / 60000);
                const s = Math.floor((rem % 60000) / 1000);
                timerDisplay.innerText = `عُد بعد: ${h}س ${m}د ${s}ث`;
                setTimeout(updateTimer, 1000);
                return;
            }
        }
        btn.disabled = false;
        timerDisplay.style.display = 'none';
    }

    window.onload = () => {
        drawWheel();
        setTimeout(drawWheel, 500);
        updateTimer();
        if (tg) { tg.expand(); tg.ready(); }
    };

    btn.onclick = () => {
        btn.disabled = true;
        const luck = Math.random() * 100;
        let targetIdx = luck <= 80 ? 6 : 3; // 80% لـ 5 ليرات

        const segDeg = 360 / segments.length;
        const stopAt = (360 - (targetIdx * segDeg) - (segDeg / 2) + 270) % 360;
        let rotation = 3600 + stopAt;
        canvas.style.transform = `rotate(${rotation}deg)`;

        setTimeout(() => {
            const result = segments[targetIdx];
            localStorage.setItem('last_spin_sy', Date.now().toString());

            // إرسال البيانات للبوت لتحديث الرصيد الفعلي
            if (tg && tg.sendData) {
                tg.sendData(JSON.stringify({
                    win: result.value,
                    label: result.label
                }));
            }
            alert(result.value > 0 ? `مبروك! ربحت ${result.value} ليرة` : "حظ أوفر!");
            updateTimer();
        }, 7500);
    };
</script>
</body>
</html>
