<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lira Cash - Syria</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0f121a;
            --card-bg: #1e222d;
            --text-main: #ffffff;
            --text-dim: #8e9297;
            --accent-gold: #ffb400;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* حاوية المعلومات العلوية */
        .header {
            width: 100%;
            padding: 20px;
            text-align: center;
            background: linear-gradient(to bottom, #161b26, var(--bg-color));
        }

        .header h1 { color: var(--accent-gold); margin: 0; font-size: 24px; }
        .header p { color: var(--text-dim); margin: 5px 0; }

        /* منطقة العجلة */
        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 20px auto;
        }

        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid var(--card-bg);
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
            background: conic-gradient(
                #ffb400 0deg 60deg, #1e222d 60deg 120deg,
                #ffb400 120deg 180deg, #1e222d 180deg 240deg,
                #ffb400 240deg 300deg, #1e222d 300deg 360deg
            );
        }

        .spin-btn {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 60px; height: 60px;
            background: var(--accent-gold);
            border-radius: 50%;
            border: none;
            color: #000; font-weight: bold;
            cursor: pointer; z-index: 10;
            box-shadow: 0 0 15px rgba(255, 180, 0, 0.5);
        }

        /* الشبكة "بالميلي" - الخانتين المتساويتين */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 90%;
            max-width: 400px;
            margin-top: 30px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            border: 1px solid #2d323e;
            transition: 0.2s;
        }

        .card:active { transform: scale(0.95); }
        .card img { width: 40px; height: 40px; margin-bottom: 10px; }
        .card h3 { font-size: 16px; margin: 5px 0; }
        .card p { font-size: 11px; color: var(--text-dim); margin: 0; }

        /* التنبيهات */
        #status {
            margin-top: 15px;
            color: var(--accent-gold);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Lira Cash</h1>
        <p id="user-name">أهلاً بك</p>
    </div>

    <div class="wheel-container">
        <div id="wheel"></div>
        <button class="spin-btn" onclick="spinWheel()">إبدأ</button>
    </div>

    <div id="status">جرب حظك اليوم!</div>

    <div class="dashboard-grid">
        <div class="card" onclick="sendMessage('المهمات')">
            <h3>🚀 المهمات</h3>
            <p>جمع قسائم مجانية</p>
        </div>
        <div class="card" onclick="sendMessage('السحب')">
            <h3>💰 السحب</h3>
            <p>اطلب أرباحك الآن</p>
        </div>
        <div class="card" onclick="sendMessage('الشكاوي')">
            <h3>⚠️ شكوى</h3>
            <p>تواجه مشكلة؟</p>
        </div>
        <div class="card" onclick="sendMessage('برومو كود')">
            <h3>🎫 برومو</h3>
            <p>أدخل كود الهدية</p>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // فتح الصفحة بكامل الشاشة

        const wheel = document.getElementById('wheel');
        const status = document.getElementById('status');
        let canSpin = true;

        function spinWheel() {
            if (!canSpin) return;
            canSpin = false;
            
            const randomDegree = Math.floor(Math.random() * 360) + 1800; // 5 دورات كحد أدنى
            wheel.style.transform = `rotate(${randomDegree}deg)`;

            setTimeout(() => {
                const winAmounts = [5, 10, 15, 20, 50, 100];
                const prize = winAmounts[Math.floor(Math.random() * winAmounts.length)];
                
                status.innerText = `مبروك! ربحت ${prize} ليرة`;
                
                // إرسال البيانات للبوت
                tg.sendData(JSON.stringify({
                    win: prize,
                    action: 'wheel_spin'
                }));

                // إغلاق الواجهة تلقائياً بعد ثانيتين
                setTimeout(() => tg.close(), 2000);
            }, 4000);
        }

        function sendMessage(text) {
            tg.sendData(JSON.stringify({ action: 'navigate', menu: text }));
            tg.close();
        }
    </script>
</body>
</html>
