<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Syria Cash - v2.2</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --accent-color: #800020; /* خمري ملكي */
            --card-bg: #161616;
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
            --gold: #ffb400;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        /* الهيدر مع الزر الجانبي */
        .header {
            width: 100%;
            padding: 20px 0;
            text-align: center;
            background: linear-gradient(180deg, var(--accent-color) 0%, var(--bg-color) 100%);
            position: relative;
        }

        .side-btn {
            position: absolute;
            right: 10px; top: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--accent-color);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
        }

        /* العجلة */
        .wheel-container {
            position: relative;
            width: 260px; height: 260px;
            margin: 20px auto;
            border: 8px solid var(--accent-color);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(128, 0, 32, 0.6);
        }

        #wheel {
            width: 100%; height: 100%;
            border-radius: 50%;
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
            background: conic-gradient(
                var(--accent-color) 0deg 60deg, #1a1a1a 60deg 120deg,
                var(--accent-color) 120deg 180deg, #1a1a1a 180deg 240deg,
                var(--accent-color) 240deg 300deg, #1a1a1a 300deg 360deg
            );
        }

        .spin-btn {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 60px; height: 60px;
            background: white; color: var(--accent-color);
            border-radius: 50%; border: none; font-weight: bold;
            cursor: pointer; z-index: 10;
        }

        /* شبكة الأزرار */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 90%;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            border: 1px solid #2d2d2d;
            transition: 0.2s;
        }

        .card:active { background: var(--accent-color); transform: scale(0.95); }
        .card h3 { font-size: 15px; margin: 5px 0; color: var(--text-main); }
        .card p { font-size: 10px; color: var(--text-dim); margin: 0; }

        #status { color: var(--gold); font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>

    <div class="header">
        <button class="side-btn" onclick="sendToBot('الرئيسية')">🚪 ادخل عالم البوت</button>
        <h1>Syria Cash</h1>
        <p>Premium v2.2</p>
    </div>

    <div id="status">جرب حظك بالعجلة الملكية!</div>

    <div class="wheel-container">
        <div id="wheel"></div>
        <button class="spin-btn" onclick="spinWheel()">العب</button>
    </div>

    <div class="dashboard-grid">
        <div class="card" onclick="sendToBot('المهمات')">
            <h3>🚀 المهمات</h3>
            <p>أكمل المهام واربح</p>
        </div>
        <div class="card" onclick="sendToBot('السحب')">
            <h3>💰 السحب</h3>
            <p>اطلب أرباحك الآن</p>
        </div>
        <div class="card" onclick="sendToBot('الإحالات')">
            <h3>👥 الإحالات</h3>
            <p>أدعُ أصدقاءك</p>
        </div>
        <div class="card" onclick="sendToBot('برومو كود')">
            <h3>🎫 برومو</h3>
            <p>أدخل كود الهدية</p>
        </div>
        <div class="card" onclick="sendToBot('الدعم')">
            <h3>👨‍💻 الدعم</h3>
            <p>تواصل معنا</p>
        </div>
        <div class="card" onclick="sendToBot('الشروط')">
            <h3>📜 الشروط</h3>
            <p>قوانين العمل</p>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function sendToBot(name) {
            tg.sendData(JSON.stringify({
                action: 'navigate',
                menu: name
            }));
            setTimeout(() => tg.close(), 150);
        }

        let canSpin = true;
        function spinWheel() {
            if (!canSpin) return;
            canSpin = false;
            const wheel = document.getElementById('wheel');
            const deg = Math.floor(Math.random() * 360) + 2160;
            wheel.style.transform = `rotate(${deg}deg)`;

            setTimeout(() => {
                const prizes = [5, 10, 15, 20, 50, 100];
                const win = prizes[Math.floor(Math.random() * prizes.length)];
                document.getElementById('status').innerText = `مبروك! ربحت ${win} ليرة`;
                
                tg.sendData(JSON.stringify({
                    action: 'wheel_spin',
                    win: win
                }));
            }, 4000);
        }
    </script>
</body>
</html>
