<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syria Cash - Royal Wheel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            background: #000; color: white; font-family: sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; height: 100vh; margin: 0;
        }
        .wheel-container { position: relative; width: 350px; height: 350px; }
        canvas { 
            width: 100%; height: 100%; border-radius: 50%;
            border: 10px solid #1a1a1a; transition: transform 6s cubic-bezier(0.1, 0, 0.1, 1);
        }
        .pointer {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 20px solid transparent; 
            border-right: 20px solid transparent; border-top: 35px solid #fff; z-index: 10;
        }
        .center {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 60px; height: 60px; background: #ff0000; border-radius: 50%; 
            border: 4px solid #1a1a1a; z-index: 5;
        }
        .spin-btn {
            margin-top: 40px; padding: 15px 50px; font-size: 20px; font-weight: bold;
            background: linear-gradient(180deg, #222, #000); color: #fff;
            border: 2px solid #444; border-radius: 50px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="wheel-container">
        <div class="pointer"></div>
        <div class="center"></div>
        <canvas id="wheel" width="500" height="500"></canvas>
    </div>

    <button id="spin-button" class="spin-btn">لفّ العجلة الملكية 👑</button>

<script>
    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const btn = document.getElementById('spin-button');

    // الجوائز كما في صورتك تماماً (للعرض فقط)
    const segments = [
        { label: "100 ليرة", color: "#b91c1c" }, // أحمر
        { label: "20 ليرة", color: "#ea580c" },  // برتقالي
        { label: "1 ليرة", color: "#16a34a" },   // أخضر
        { label: "حظ أوفر", color: "#475569" },  // رمادي
        { label: "50 ليرة", color: "#9333ea" },  // بنفسجي
        { label: "10 ليرات", color: "#ca8a04" }, // ذهبي
        { label: "5 ليرات", color: "#0284c7" },  // أزرق سماوي
        { label: "7 ليرات", color: "#7c3aed" },  // أرجواني
        { label: "12 ليرة", color: "#2563eb" }   // أزرق
    ];

    function drawWheel() {
        const angle = (2 * Math.PI) / segments.length;
        segments.forEach((seg, i) => {
            ctx.beginPath(); ctx.fillStyle = seg.color; ctx.moveTo(250, 250);
            ctx.arc(250, 250, 250, i * angle, (i + 1) * angle); ctx.fill();
            ctx.save(); ctx.translate(250, 250); ctx.rotate(i * angle + angle / 2);
            ctx.textAlign = "right"; ctx.fillStyle = "white"; ctx.font = "bold 22px Arial";
            ctx.fillText(seg.label, 230, 10); ctx.restore();
        });
    }
    drawWheel();

    let rotation = 0;
    btn.onclick = () => {
        btn.disabled = true;

        // --- البرمجة الخفية للنسب (الخوارزمية) ---
        const randomLuck = Math.random() * 100;
        let targetIndex;

        if (randomLuck <= 80) {
            // نسبة 80%: الوقوف على "5 ليرات" (التي تقع في الفئة رقم 6 في المصفوفة)
            targetIndex = 6; 
        } else {
            // نسبة 20%: الوقوف على "حظ أوفر" (التي تقع في الفئة رقم 3 في المصفوفة)
            targetIndex = 3;
        }

        // حساب زاوية التوقف بدقة
        const segmentAngle = 360 / segments.length;
        const targetAngle = (360 - (targetIndex * segmentAngle) - (segmentAngle / 2) + 270) % 360;
        
        rotation += 3600 + targetAngle - (rotation % 360);
        canvas.style.transform = `rotate(${rotation}deg)`;

        setTimeout(() => {
            const result = segments[targetIndex];
            
            // إرسال النتيجة للبوت (دائماً ستكون 5 ليرات أو حظ أوفر برمجياً)
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.sendData(JSON.stringify({
                    prize: result.label,
                    value: targetIndex === 6 ? 5 : 0
                }));
            }
            alert(targetIndex === 6 ? "مبروك! ربحت 5 ليرات" : "حظ أوفر في المرة القادمة");
            btn.disabled = false;
        }, 6000);
    };
</script>
</body>
</html>
